<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>요기요 런 — 시즌 챌린지</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    touch-action: none;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C = document.getElementById('c');
const cx = C.getContext('2d');

// 음식 이미지
const foodImgs = Array.from({length: 16}, (_, i) => {
  const img = new Image(); img.src = `food${i}.png`; return img;
});

// 보너스 이미지
const bonusImgs = { golden_time: new Image() };
bonusImgs.golden_time.src = 'bonus_golden_time.png';

// 자석 포션
const magnetImg = new Image();
magnetImg.src = 'bonus_magnet.png';

// 무적 포션 4프레임 스프라이트 (날개 팔락)
// 새 날갯짓 기준 ~3.75회/초 → 4프레임 × 4게임프레임 = 16프레임/사이클
const invincibleImgs = [1,2,3,4].map(i => {
  const img = new Image(); img.src = `bonus_invincible_${i}.png`; return img;
});

// 장애물 디버프 이미지 (reverse/blind용 포션)
const debuffImgs = {
  reverse: new Image(),
  blind:   new Image(),
};
debuffImgs.reverse.src = 'debuff_reverse.png'; // 소용돌이 포션
debuffImgs.blind.src   = 'debuff_blind.png';   // 수면 포션

// 배경
const bgImg = new Image();
bgImg.src = 'road-bg.png';
let bgReady = false, bgY = 0;
bgImg.onload = () => { bgReady = true; };

// ── 장애물 이미지 ────────────────────────────────
const tireImg = new Image();
tireImg.src = 'obs_tire.png';
let tireReady = false;
tireImg.onload = () => { tireReady = true; };

// 조리 이미지
const imgs = {
  front1: new Image(), front2: new Image(),
  left: new Image(), right: new Image()
};
imgs.front1.src = 'jori-front1.png'; imgs.front2.src = 'jori-front2.png';
imgs.left.src   = 'jori-left2.png';  imgs.right.src  = 'jori-right2.png';
const imgReady = { front1: false, front2: false, left: false, right: false };
imgs.front1.onload = () => { imgReady.front1 = true; };
imgs.front2.onload = () => { imgReady.front2 = true; };
imgs.left.onload   = () => { imgReady.left   = true; };
imgs.right.onload  = () => { imgReady.right  = true; };

// ── 캔버스 세팅 ──────────────────────────────────
const W = 375, H = 667;
const DPR = window.devicePixelRatio || 1;
C.width = W * DPR; C.height = H * DPR;
cx.scale(DPR, DPR);
function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  C.style.width = W * s + 'px'; C.style.height = H * s + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── 상수 ──────────────────────────────────────────
const PLAYER_SPEED = 2.7;  // 최대 속도 px/frame (2/3 감소)
const PLAYER_ACCEL = 0.33; // 가속도 (2/3 감소)
const PLAYER_FRIC  = 0.80; // 마찰
const PLAYER_Y_MIN = 160;  // 세로 이동 상한
const PLAYER_Y_MAX = 600;  // 세로 이동 하한
const TIME_INIT    = 60 * 60; // 1분

const OBS_TYPES   = ['damage']; // reverse/blind 제거
const BONUS_TYPES = [];         // magnet/slow/fever/dash 제거 — golden_time만 별도 스폰
// golden_time은 별도 희귀 스폰으로 관리 (10초 남을 때 1회)

// 콤보 마일스톤: [임계값, 배율, 색상, 메시지]
const COMBO_TIERS = [
  { at:   5, mult:  2, col: '#ffd700', msg: 'COMBO ×5! 🔥'    },
  { at:  10, mult:  3, col: '#ff9900', msg: 'COMBO ×10!! 🔥🔥' },
  { at:  20, mult:  5, col: '#ff5500', msg: 'COMBO ×20!!! 🔥'  },
  { at:  30, mult:  8, col: '#ff2200', msg: 'COMBO ×30!! 💥'   },
  { at:  60, mult: 12, col: '#ff0055', msg: 'COMBO ×60!!! 💥💥' },
  { at: 100, mult: 20, col: '#cc00ff', msg: 'LEGENDARY ×100 ✨' },
];
function getComboMult(c) {
  let m = 1;
  for (const t of COMBO_TIERS) { if (c >= t.at) m = t.mult; }
  return m;
}
const COMBO_TIMER = 180; // 3초 = 180프레임

const COL = {
  bg: '#0a0e1a', primary: '#fa0050', gold: '#f5c400',
  green: '#05c896', white: '#ffffff', time: '#00d4ff',
};

// ── 상태 ──────────────────────────────────────────
let S = 'start';
let score = 0, hi = 0, lives = 3, frame = 0, timeLeft = 0;
let baseSpeed = 4, combo = 0, comboT = 0;
let items = [], particles = [], popups = [];
let scoreParticles = []; // 점수 HUD로 날아가는 파티클
let scorePop = 0;        // 점수 띠용 bounce 타이머
let extraTimeAnim = 0;        // EXTRA TIME! 연출 카운트다운 (150프레임)
let goldenSpawned = false;    // 이번 게임에서 황금 물약 스폰 여부
let invincibleOnScreen = false; // 무적 포션 중복 방지
let magnetOnScreen = false;     // 자석 포션 중복 방지
// 긴박 메시지 — Temple Run / Subway Surfers 스타일
let urgentMsg = null;    // { text, col, life, maxLife }
let lastUrgentSec = -1; // 중복 방지용 마지막 표시 초

// ── 플레이어 ──────────────────────────────────────
const P = {
  x: W / 2, y: 500,
  vx: 0, vy: 0,    // 수평/수직 속도 (자유이동)
  inv: 0, shake: 0, bump: 0,
  dir: 0,           // 방향 (-1=left, 0=straight, 1=right) - 뱅킹 애니용
  reverseTimer: 0, blindTimer: 0,
  magnetTimer: 0,  slowTimer: 0,
  feverTimer: 0,   dashTimer: 0,
  invincibleTimer: 0,  // 무적 타이머 (프레임)
};

// ── 입력 ──────────────────────────────────────────
const keys = {};
let touchX = null, touchY = null; // 현재 터치 위치

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((e.key === ' ' || e.key === 'Enter') && S !== 'play') startGame();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

C.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = C.getBoundingClientRect();
  touchX = (e.touches[0].clientX - rect.left) * (W / rect.width);
  touchY = (e.touches[0].clientY - rect.top)  * (H / rect.height);
  if (S !== 'play') startGame();
}, { passive: false });

C.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = C.getBoundingClientRect();
  touchX = (e.touches[0].clientX - rect.left) * (W / rect.width);
  touchY = (e.touches[0].clientY - rect.top)  * (H / rect.height);
}, { passive: false });

C.addEventListener('touchend', e => {
  e.preventDefault();
  touchX = null; touchY = null;
}, { passive: false });

C.addEventListener('click', () => { if (S !== 'play') startGame(); });

// ── 이동 처리 (슈팅게임식 자유이동) ────────────────
function processInput() {
  if (S !== 'play') return;

  const speed = PLAYER_SPEED * (P.dashTimer > 0 ? 1.7 : 1) * (P.invincibleTimer > 0 ? 2 : 1);

  if (touchX !== null) {
    // 터치: 좌/우 방향 (X), 위/아래 방향 (Y) — 찔끔 가속
    const dirX = touchX < W / 2 ? -1 : 1;
    P.vx += dirX * PLAYER_ACCEL;
    P.vx = Math.max(-speed, Math.min(speed, P.vx));

    const dirY = touchY !== null ? (touchY < H / 2 ? -1 : 1) : 0;
    P.vy += dirY * PLAYER_ACCEL;
    P.vy = Math.max(-speed, Math.min(speed, P.vy));
  } else {
    // 키보드: 가속 + 마찰 (수평)
    let dir = 0;
    if (keys['ArrowLeft']  || keys['a'] || keys['A']) dir = -1;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) dir =  1;
    if (P.reverseTimer > 0) dir *= -1;

    if (dir !== 0) {
      P.vx += dir * PLAYER_ACCEL;
      P.vx = Math.max(-speed, Math.min(speed, P.vx));
    } else {
      P.vx *= PLAYER_FRIC;
      if (Math.abs(P.vx) < 0.15) P.vx = 0;
    }

    // 키보드: 수직
    let dirY = 0;
    if (keys['ArrowUp']   || keys['w'] || keys['W']) dirY = -1;
    if (keys['ArrowDown'] || keys['s'] || keys['S']) dirY =  1;
    if (P.reverseTimer > 0) dirY *= -1;

    if (dirY !== 0) {
      P.vy += dirY * PLAYER_ACCEL;
      P.vy = Math.max(-speed, Math.min(speed, P.vy));
    } else {
      P.vy *= PLAYER_FRIC;
      if (Math.abs(P.vy) < 0.15) P.vy = 0;
    }
  }
}

// ── 게임 시작 ──────────────────────────────────────
function startGame() {
  S = 'play';
  score = 0; lives = 3; frame = 0; timeLeft = TIME_INIT;
  baseSpeed = 4; combo = 0; comboT = 0;
  items = []; particles = []; popups = [];
  P.x = W / 2; P.y = 500; P.vx = 0; P.vy = 0;
  P.inv = 0; P.shake = 0; P.bump = 0; P.dir = 0;
  P.reverseTimer = 0; P.blindTimer = 0; P.magnetTimer = 0;
  P.slowTimer = 0; P.feverTimer = 0; P.dashTimer = 0;
  extraTimeAnim = 0; goldenSpawned = false; invincibleOnScreen = false; magnetOnScreen = false;
  scoreParticles = []; scorePop = 0;
  urgentMsg = null; lastUrgentSec = -1;
  P.invincibleTimer = 0;
}

// ── 스폰 (레인 없음 — 랜덤 X) ──────────────────────
// 난이도: 점수 기반 → 시간(frame) 기반으로 변경
// 1분 게임 안에 모든 플레이어가 동일한 난이도 곡선을 경험
function getDifficultyTier() {
  // 점수 기반 난이도 — 잘하는 사람이 더 빠르게 어려워짐
  if (score < 100)  return 0; // 튜토리얼
  if (score < 350)  return 1; // 워밍업
  if (score < 800)  return 2; // 중반
  if (score < 1800) return 3; // 빠듯함
  return 4;                   // 클라이맥스
}

function randX(margin = 30) {
  return margin + Math.random() * (W - margin * 2);
}

// 기존 아이템과 겹치는지 검사 (화면 상단 영역만 체크)
function hasOverlap(x, y, minDist = 70) {
  return items.some(it => {
    const dx = it.x - x, dy = it.y - y;
    return Math.sqrt(dx*dx + dy*dy) < minDist;
  });
}
function safeX(margin = 40, minDist = 70, spawnY = -40) {
  for (let i = 0; i < 8; i++) {
    const x = randX(margin);
    if (!hasOverlap(x, spawnY, minDist)) return x;
  }
  return randX(margin); // 8회 시도 후 포기
}


function makeItem(x, kind, obsType, bonusType) {
  // 음식 점수 배율 — 70%: ×1, 25%: ×2, 5%: ×3
  const fRand = Math.random();
  const foodMult = kind === 'food' ? (fRand < 0.05 ? 3 : fRand < 0.30 ? 2 : 1) : 1;
  return {
    x, y: -50,
    kind,
    foodIdx:   kind === 'food'  ? Math.floor(Math.random() * foodImgs.length) : -1,
    foodMult,
    obsType:   obsType   || null,
    bonusType: bonusType || null,
    spd: kind === 'food' ? 1.8 + Math.random() * 0.4 : baseSpeed * (0.65 + Math.random() * 0.2),
    r: 22,
  };
}

// 시뮬레이션 검증 결과 (n=10,000):
// tier 0( 0-10s): 장애물 0.04/s  음식 0.83/s  spd 2.5px/f
// tier 1(10-25s): 장애물 0.10/s  음식 0.86/s  spd 3.1px/f
// tier 2(25-40s): 장애물 0.24/s  음식 0.96/s  spd 4.3px/f
// tier 3(40-55s): 장애물 0.56/s  음식 1.12/s  spd 4.8px/f
// tier 4(55-60s): 장애물 1.09/s  음식 1.36/s  spd 6.0px/f
// 중앙 점수: 1,690 / 상위10%: 3,540
function spawn() {
  const tier = getDifficultyTier();
  const obsChance  = [0.07, 0.12, 0.18, 0.25, 0.32][tier]; // 초반도 장애물 적절히
  const foodChance = [0.80, 0.72, 0.64, 0.56, 0.48][tier]; // 음식 더 자주

  const rand = Math.random();
  let kind = null;
  if (rand < obsChance)                  kind = 'obs';
  else if (rand < obsChance + foodChance) kind = 'food';
  if (!kind) return;

  const x = safeX(40, 65);
  items.push(makeItem(x, kind, kind === 'obs' ? 'damage' : null, null));
}

// 장애물 페어 스폰 — 25초 이후, 매우 드물게
function spawnPair() {
  const tier = getDifficultyTier();
  if (tier < 2) return;
  const spd = baseSpeed * (0.65 + Math.random() * 0.2);
  const side = Math.random() < 0.5 ? 0 : 1;
  const base = side === 0 ? 55 : W - 55;
  const spread = 55;
  let placed = 0;
  for (let i = 0; i < 2; i++) {
    const x = base + (i === 0 ? -spread * 0.3 : spread * 0.3) * (side === 0 ? 1 : -1);
    if (hasOverlap(x, -40, 65)) continue;
    const it = makeItem(x, 'obs', 'damage', null);
    it.spd = spd;
    items.push(it);
    placed++;
  }
}

// ── 파티클 ────────────────────────────────────────
function burst(x, y, col, n = 10) {
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 / n) * i, s = 2 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, alpha: 1, col, sz: 3 + Math.random()*3 });
  }
}

function popup(x, y, t, col) {
  popups.push({ x, y, txt: t, col, alpha: 1, vy: -1.8 });
}

// ── 업데이트 ──────────────────────────────────────
function update() {
  frame++; // start/over 화면 애니메이션용으로 항상 증가
  if (S !== 'play') return;

  // EXTRA TIME 연출 카운트다운
  if (extraTimeAnim > 0) extraTimeAnim--;

  // 타이머 (연출 중 일시 슬로우)
  const timerFrozen = extraTimeAnim > 90; // 연출 초반 1.5초간 시간 멈춤
  if (!timerFrozen) {
    if (timeLeft > 0) timeLeft--;
    else { S = 'over'; if (score > hi) hi = score; return; }
  }

  // ── 긴박 메시지 트리거 (Temple Run / Subway Surfers 스타일) ───
  if (urgentMsg && urgentMsg.life > 0) urgentMsg.life--;
  const secs = Math.ceil(timeLeft / 60);
  function showUrgent(text, col) {
    if (lastUrgentSec !== secs) { urgentMsg = { text, col, life: 90, maxLife: 90 }; lastUrgentSec = secs; }
  }
  if (!timerFrozen) {
    if (secs === 30) showUrgent('HURRY UP!', '#ff9900');
    else if (secs === 20) showUrgent('TIME IS RUNNING OUT!', '#ff5500');
    else if (secs === 15) showUrgent('KEEP GOING!', '#ff3300');
    else if (secs === 10) showUrgent('LAST CHANCE!', '#ff0000');
    else if (secs <=  5 && secs > 0 && secs !== lastUrgentSec) showUrgent(`${secs}...`, '#ff0000');
  }
  if (combo >= 5  && combo % 5 === 0 && comboT === 69) showUrgent(`×${combo} COMBO!! 🔥`, COL.gold);
  if (lives === 1 && frame % 300 === 1) { urgentMsg = { text: '⚠️ LAST LIFE!', col: COL.primary, life: 80, maxLife: 80 }; }

  // 황금 물약 — 10초 남았을 때 1회만 스폰 (느리게 내려옴)
  if (!goldenSpawned && timeLeft <= 600 && timeLeft > 0) {
    goldenSpawned = true;
    const gt = makeItem(safeX(50, 60), 'bonus', null, 'golden_time');
    gt.spd = 1.5; // 천천히 내려오게
    items.push(gt);
  }

  // 무적 포션 — tier2+(25초~) 이후 등장, 최대 1개, 라이프1일때 확률 상승
  if (!invincibleOnScreen && score >= 350 && P.invincibleTimer === 0) {
    const chance = lives === 1 ? 0.0025 : 0.0007; // 라이프1: ~6초마다 / 정상: ~24초마다
    if (Math.random() < chance) {
      const it = makeItem(safeX(70, 80), 'bonus', null, 'invincible');
      it.spd      = 1.0;          // 느린 하강
      it.baseX    = it.x;         // 살랑살랑 기준 X
      it.animFrame = 0;           // 날개 애니 카운터
      it.swayPhase = Math.random() * Math.PI * 2; // 시작 위상 랜덤
      items.push(it);
      invincibleOnScreen = true;
    }
  }

  // 자석 포션 — score 100+ 이후, 최대 1개, magnetTimer 없을 때만
  if (!magnetOnScreen && score >= 100 && P.magnetTimer === 0) {
    const chance = 0.0008; // ~21초마다
    if (Math.random() < chance) {
      const it = makeItem(safeX(50, 70), 'bonus', null, 'magnet');
      it.spd = 1.5;
      items.push(it);
      magnetOnScreen = true;
    }
  }

  baseSpeed = 2.5 + Math.min(score / 1000, 1) * 3.5; // 2.5 → 6.0 (score 0→1000 기준)

  processInput();

  // 플레이어 위치 적용
  P.x += P.vx;
  P.x = Math.max(20, Math.min(W - 20, P.x));
  P.y += P.vy;
  P.y = Math.max(PLAYER_Y_MIN, Math.min(PLAYER_Y_MAX, P.y));

  // 벽에서 튕기기
  if (P.x <= 20 || P.x >= W - 20) P.vx *= -0.3;
  if (P.y <= PLAYER_Y_MIN || P.y >= PLAYER_Y_MAX) P.vy *= -0.3;

  // 방향 뱅킹
  P.dir = P.vx > 1.2 ? 1 : P.vx < -1.2 ? -1 : 0;

  if (P.shake > 0) P.shake--;
  if (P.bump  > 0) P.bump--;
  if (P.inv   > 0) P.inv--;
  if (P.reverseTimer > 0) P.reverseTimer--;
  if (P.blindTimer   > 0) P.blindTimer--;
  if (P.magnetTimer  > 0) P.magnetTimer--;
  if (P.slowTimer    > 0) P.slowTimer--;
  if (P.feverTimer   > 0) P.feverTimer--;
  if (P.dashTimer       > 0) P.dashTimer--;
  if (P.invincibleTimer > 0) P.invincibleTimer--;
  if (comboT > 0) comboT--; else if (combo > 0) { combo = 0; comboT = 0; }

  // 스폰 간격도 시간 기반
  const tier = getDifficultyTier();
  const spawnRate = [55, 46, 38, 30, 24][tier];
  if (frame % spawnRate === 0) spawn();

  // 페어 스폰: 25초(tier2)부터, 아주 드물게
  const pairRate = [0, 0, 700, 560, 420][tier];
  if (pairRate > 0 && frame % pairRate === 0) spawnPair();

  items = items.filter(it => {
    const spd = P.invincibleTimer > 0 ? it.spd * 2 : (P.slowTimer > 0 ? it.spd * 0.4 : it.spd);
    it.y += spd;

    // 무적 포션: 좌우 살랑살랑 이동 + 날개 애니 카운터 증가
    if (it.bonusType === 'invincible') {
      it.animFrame++;
      it.x = it.baseX + Math.sin(it.swayPhase + it.animFrame * (Math.PI * 2 / 150)) * 48;
    }

    // 자석 효과: 음식 아이템을 플레이어 방향으로 당김 (장애물 제외)
    if (P.magnetTimer > 0 && it.kind === 'food') {
      const MAGNET_RADIUS = 200;
      const mdx = P.x - it.x, mdy = P.y - it.y;
      const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
      if (mdist < MAGNET_RADIUS && mdist > 1) {
        const pull = 3.5 * (1 - mdist / MAGNET_RADIUS);
        it.x += (mdx / mdist) * pull;
        it.y += (mdy / mdist) * pull;
      }
    }

    const dx = Math.abs(it.x - P.x);
    const dy = Math.abs(it.y - P.y);
    // 캐릭터 72px 기준 충돌 반지름 (자석 활성 시 음식 범위 확대)
    const hitR = it.kind === 'obs'
      ? (it.obsType === 'damage' ? 55 : 48)
      : it.kind === 'bonus' ? 50
      : (P.magnetTimer > 0 ? 90 : 46);

    const colliding = dx < hitR && dy < hitR;
    if (!colliding) {
      const alive = it.y < H + 60;
      if (!alive) {
        if (it.bonusType === 'invincible') invincibleOnScreen = false;
        if (it.bonusType === 'magnet') magnetOnScreen = false;
      }
      return alive;
    }

    // ── 충돌 처리 ───────────────────────────────
    if (it.kind === 'obs') {
      if (P.invincibleTimer > 0) {
        // 무적 상태 — 장애물 파괴, 데미지 없음
        burst(it.x, it.y, '#ffffff', 10);
        burst(it.x, it.y, '#ffd700', 6);
        return false;
      }
      if (P.inv > 0) {
        // 데미지 무적(피격 후 80프레임) — 통과
        return it.y < H + 60;
      }
      // 데미지
      lives--;
      P.inv = 80; P.shake = 18; P.bump = 10;
      burst(it.x, it.y, COL.primary, 12);
      popup(P.x, P.y - 40, '💀 −1 LIFE', COL.primary);
      if (lives <= 0) { S = 'over'; if (score > hi) hi = score; }
      return false;
    } else if (it.kind === 'bonus') {
        if (it.bonusType === 'invincible') {
          P.invincibleTimer = 720; // 12초 무적
          invincibleOnScreen = false;
          burst(it.x, it.y, '#fff', 20);
          burst(it.x, it.y, '#ffd700', 16);
          urgentMsg = { text: '⚡ SUPER JORY! ×2 SPEED ⚡', col: '#ffd700', life: 120, maxLife: 120 };
          lastUrgentSec = -99;
          popup(P.x, P.y - 50, '⚡ SUPER JORY 12s!', '#ffd700');
        } else if (it.bonusType === 'golden_time') {
          timeLeft += 30 * 60; // +30초
          goldenSpawned = false;
          extraTimeAnim = 150;  // EXTRA TIME! 연출 시작
          burst(it.x, it.y, COL.gold, 20);
          burst(it.x, it.y, '#fff', 12);
        } else if (it.bonusType === 'magnet') {
          P.magnetTimer = 720; // 12초
          magnetOnScreen = false;
          burst(it.x, it.y, '#00aaff', 20);
          burst(it.x, it.y, '#fff', 10);
          urgentMsg = { text: '🧲 MAGNET! 음식이 달려온다!', col: '#00ccff', life: 120, maxLife: 120 };
          lastUrgentSec = -99;
          popup(P.x, P.y - 50, '🧲 MAGNET 12s!', '#00ccff');
        }
        return false;
      } else {
        const feverMult = P.feverTimer > 0 ? 2 : 1;
        const foodMult  = it.foodMult || 1;
        const prevCombo = combo;
        combo++; comboT = COMBO_TIMER;

        // 콤보 마일스톤 달성 여부 체크 (새 combo 값 기준)
        const milestone = COMBO_TIERS.find(t => t.at === combo);
        const comboMult = getComboMult(combo);
        // 마일스톤 도달 시 점수 추가 뻥튀기 (×2)
        const milestoneMult = milestone ? 2 : 1;
        const pts = Math.floor(10 * foodMult * feverMult * comboMult * milestoneMult);
        score += pts;
        timeLeft += 120; // 2초 추가, 상한 없음

        // 이펙트
        const burstCol = milestone ? milestone.col : (P.feverTimer > 0 ? COL.gold : '#fff');
        burst(it.x, it.y, burstCol, milestone ? 18 : 7);

        // 팝업 텍스트
        const multLabel = foodMult > 1 ? ` ×${foodMult}` : '';
        const comboLabel = combo >= 5 ? ` [×${comboMult}콤보]` : '';
        popup(it.x, it.y - 10, `+${pts}${multLabel}${comboLabel}`, milestone ? milestone.col : COL.gold);
        popup(it.x, it.y - 28, '+1s ⏰', COL.time);

        // 마일스톤 메시지
        if (milestone) {
          urgentMsg = { text: milestone.msg, col: milestone.col, life: 100, maxLife: 100 };
          lastUrgentSec = -99; // 다른 메시지와 충돌 방지
        }

        // 점수 파티클 — HUD 점수 위치로 날아감
        const pCol = milestone ? milestone.col : (foodMult >= 3 ? '#ff5500' : foodMult >= 2 ? COL.gold : '#ffffff');
        const pCount = (foodMult + 2) * (milestone ? 3 : 1) + (combo > 10 ? 2 : 0);
        for (let i = 0; i < pCount; i++) {
          scoreParticles.push({
            x: it.x + (Math.random()-0.5)*20,
            y: it.y + (Math.random()-0.5)*20,
            vx: (Math.random()-0.5)*4,
            vy: -2 - Math.random()*3,
            col: pCol, sz: 3 + Math.random()*3, life: 0,
          });
        }
        return false;
      }
    return false; // unreachable but safe fallback
  });

  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.alpha -= 0.025;
    return p.alpha > 0;
  });
  popups = popups.filter(p => {
    p.y += p.vy; p.alpha -= 0.022; return p.alpha > 0;
  });

  // 점수 HUD 파티클 — 왼쪽 상단 점수 위치(20,20)로 호밍
  if (scorePop > 0) scorePop--;
  scoreParticles = scoreParticles.filter(p => {
    const tx = 20, ty = 20;
    const dx = tx - p.x, dy = ty - p.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 22) { scorePop = 20; return false; }
    const spd = Math.min(6 + p.life * 0.3, 14);
    const norm = dist || 1;
    p.vx += (dx / norm) * 1.8;
    p.vy += (dy / norm) * 1.8;
    const curSpd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
    if (curSpd > spd) { p.vx = p.vx/curSpd*spd; p.vy = p.vy/curSpd*spd; }
    p.x += p.vx; p.y += p.vy;
    p.life++;
    return p.life < 80;
  });
}

// ── 드로우 헬퍼 ───────────────────────────────────
function em(e, x, y, sz) {
  cx.font = `${sz}px serif`; cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillText(e, x, y);
}
function txt(t, x, y, sz, col, align = 'center') {
  cx.font = `${sz}px Pretendard, -apple-system, sans-serif`;
  cx.fillStyle = col; cx.textAlign = align; cx.textBaseline = 'middle';
  cx.fillText(t, x, y);
}
function btxt(t, x, y, sz, col, align = 'center') {
  cx.font = `bold ${sz}px Pretendard, -apple-system, sans-serif`;
  cx.fillStyle = col; cx.textAlign = align; cx.textBaseline = 'middle';
  cx.fillText(t, x, y);
}
function rrect(x, y, w, h, r, fill, stroke, sw = 1) {
  cx.beginPath();
  cx.moveTo(x+r,y); cx.lineTo(x+w-r,y); cx.arcTo(x+w,y,x+w,y+r,r);
  cx.lineTo(x+w,y+h-r); cx.arcTo(x+w,y+h,x+w-r,y+h,r);
  cx.lineTo(x+r,y+h); cx.arcTo(x,y+h,x,y+h-r,r);
  cx.lineTo(x,y+r); cx.arcTo(x,y,x+r,y,r);
  cx.closePath();
  if (fill)  { cx.fillStyle = fill; cx.fill(); }
  if (stroke){ cx.strokeStyle = stroke; cx.lineWidth = sw; cx.stroke(); }
}

// ── 배경 ──────────────────────────────────────────
function drawBG() {
  cx.fillStyle = '#4a5e30';
  cx.fillRect(0, 0, W, H);
  if (bgReady) {
    const scale = W / bgImg.width;
    const bh = bgImg.height * scale;
    if (S === 'play') { bgY += baseSpeed * 0.6 * (P.invincibleTimer > 0 ? 2 : 1); if (bgY >= bh) bgY -= bh; }
    const startY = bgY - bh;
    for (let i = 0; i < 3; i++) cx.drawImage(bgImg, 0, startY + bh * i, W, bh);
  }
}

// ── HUD ───────────────────────────────────────────
function drawHUD() {
  const danger = timeLeft < 600;
  const warn   = timeLeft < 1200;
  const tCol   = danger ? '#ff3333' : warn ? '#ffaa00' : COL.time;
  const secs   = Math.ceil(timeLeft / 60);
  const tPct   = Math.min(1, Math.max(0, timeLeft / TIME_INIT)); // 60초 초과 시 바 꽉 참

  // 상단 그라데이션
  const g = cx.createLinearGradient(0, 0, 0, 84);
  g.addColorStop(0, 'rgba(10,14,26,0.95)'); g.addColorStop(1, 'rgba(10,14,26,0)');
  cx.fillStyle = g; cx.fillRect(0, 0, W, 84);

  // ── 타이머 (중앙, 크게) ──────────────────────────
  // 숫자
  if (danger) {
    cx.shadowColor = tCol;
    cx.shadowBlur  = 16 + Math.sin(frame * 0.3) * 6;
  }
  btxt(`${secs}`, W/2, 22, 32, tCol);
  cx.shadowBlur = 0;
  txt('TIME', W/2, 42, 9, `${tCol}99`);

  // 타이머 바 (상단 전체 폭)
  const bx = 16, by = 52, bw = W - 32, bh = 5;
  cx.fillStyle = 'rgba(255,255,255,0.08)';
  cx.beginPath(); cx.roundRect(bx, by, bw, bh, 3); cx.fill();
  if (tPct > 0) {
    const fg = cx.createLinearGradient(bx, 0, bx + bw, 0);
    fg.addColorStop(0, tCol);
    fg.addColorStop(1, danger ? '#ff8866' : warn ? '#ffdd44' : '#00f0ff');
    cx.fillStyle = fg;
    if (danger) { cx.shadowColor = tCol; cx.shadowBlur = 6 + Math.sin(frame * 0.3) * 3; }
    cx.beginPath(); cx.roundRect(bx, by, bw * tPct, bh, 3); cx.fill();
    cx.shadowBlur = 0;
  }

  // ── 점수 (왼쪽) — 파티클 도착 시 띠용 bounce ─────
  if (scorePop > 0) {
    const s = 1 + Math.sin(scorePop / 20 * Math.PI) * 0.45;
    cx.save();
    cx.translate(20, 20); cx.scale(s, s); cx.translate(-20, -20);
    if (s > 1.1) { cx.shadowColor = COL.gold; cx.shadowBlur = 12 * (s - 1) * 5; }
    btxt(score.toLocaleString(), 20, 20, 18, COL.gold, 'left');
    cx.shadowBlur = 0;
    cx.restore();
  } else {
    btxt(score.toLocaleString(), 20, 20, 18, COL.gold, 'left');
  }
  txt('SCORE', 20, 36, 8, 'rgba(255,255,255,0.3)', 'left');

  // ── 라이프 (오른쪽) ──────────────────────────────
  for (let i = 0; i < 3; i++) {
    cx.globalAlpha = i < lives ? 1 : 0.18;
    em('❤️', W - 18 - i * 26, 20, 14);
  }
  cx.globalAlpha = 1;

  // ── 콤보 HUD ─────────────────────────────────────
  if (combo > 0) {
    const tier = COMBO_TIERS.slice().reverse().find(t => combo >= t.at);
    const comboCol = tier ? tier.col : 'rgba(255,255,255,0.7)';
    const comboMult = getComboMult(combo);
    const timerPct = comboT / COMBO_TIMER; // 1→0

    // 콤보 텍스트
    cx.globalAlpha = 0.85 + Math.sin(frame * 0.25) * 0.15;
    btxt(combo >= 5 ? `🔥 ×${combo} COMBO  [×${comboMult}]` : `×${combo} COMBO`, W/2, 72, combo >= 5 ? 14 : 12, comboCol);
    cx.globalAlpha = 1;

    // 콤보 타이머 바 (콤보 텍스트 아래)
    const cw = 100, ch = 3, cx0 = W/2 - cw/2, cy0 = 81;
    cx.fillStyle = 'rgba(255,255,255,0.1)';
    cx.beginPath(); cx.roundRect(cx0, cy0, cw, ch, 2); cx.fill();
    const barCol = timerPct > 0.5 ? comboCol : timerPct > 0.25 ? '#ff9900' : '#ff2200';
    cx.fillStyle = barCol;
    if (timerPct < 0.3) { cx.shadowColor = barCol; cx.shadowBlur = 6; }
    cx.beginPath(); cx.roundRect(cx0, cy0, cw * timerPct, ch, 2); cx.fill();
    cx.shadowBlur = 0;
  }

  // ── 스피드바 (하단) ───────────────────────────────
  const pct = Math.min((baseSpeed - 4) / 6, 1);
  cx.fillStyle = 'rgba(255,255,255,0.05)'; cx.fillRect(0, H - 4, W, 4);
  if (pct > 0) {
    const sg = cx.createLinearGradient(0, 0, W * pct, 0);
    sg.addColorStop(0, COL.primary); sg.addColorStop(1, COL.gold);
    cx.fillStyle = sg; cx.fillRect(0, H - 4, W * pct, 4);
  }
}

// ── 조리 ─────────────────────────────────────────
function drawJori(x, y, size, alpha = 1, dir = 0) {
  cx.globalAlpha = alpha; cx.save(); cx.translate(x, y);
  let img, ready;
  if (dir < 0)      { img = imgs.left;  ready = imgReady.left; }
  else if (dir > 0) { img = imgs.right; ready = imgReady.right; }
  else {
    const useF1 = Math.floor(frame / 30) % 2 === 0;
    img = useF1 ? imgs.front1 : imgs.front2;
    ready = useF1 ? imgReady.front1 : imgReady.front2;
  }
  if (ready && img.naturalWidth > 0) {
    // contain fit — 모든 방향 스프라이트를 size×size 박스 기준으로 균일하게
    const scale = Math.min(size / img.naturalWidth, size / img.naturalHeight);
    const w = img.naturalWidth * scale, h = img.naturalHeight * scale;
    cx.drawImage(img, -w/2, -h/2, w, h);
  } else {
    cx.font = `${size*0.9}px serif`; cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillText('🐥', 0, 0);
  }
  cx.restore(); cx.globalAlpha = 1;
}

function drawPlayer() {
  const blink = P.inv > 0 && Math.floor(P.inv / 5) % 2 === 0;
  if (blink) return;
  const sx = P.shake > 0 ? (Math.random() - 0.5) * 5 : 0;
  const sy = P.bump  > 0 ? Math.sin(P.bump * 0.4) * -6 : 0;
  const px = P.x + sx, py = P.y + sy;

  cx.globalAlpha = 0.18; cx.fillStyle = '#000';
  cx.beginPath(); cx.ellipse(px, py + 44, 36, 12, 0, 0, Math.PI * 2); cx.fill();
  cx.globalAlpha = 1;

  // 이동 잔상 (vx 기반)
  const speed = Math.abs(P.vx);
  if (speed > 1) {
    drawJori(px - P.vx * 1.2, py + 5, 52, 0.15 + speed * 0.02, P.dir);
    drawJori(px - P.vx * 2.4, py + 8, 36, 0.06 + speed * 0.01, P.dir);
  }

  drawJori(px, py, 72, 1, P.dir);

  if (P.inv > 0) {
    cx.strokeStyle = `rgba(250,0,80,${P.inv / 80 * 0.8})`;
    cx.lineWidth = 2.5;
    cx.beginPath(); cx.arc(px, py, 50, 0, Math.PI * 2); cx.stroke();
  }

  // 무적 상태 — 금색 오라 + 빠른 깜빡임
  if (P.invincibleTimer > 0) {
    const blink = Math.floor(P.invincibleTimer / 4) % 2 === 0;
    const auraA = 0.3 + Math.sin(frame * 0.3) * 0.2;
    cx.save();
    cx.strokeStyle = `rgba(255,215,0,${auraA + 0.3})`;
    cx.lineWidth = 3;
    cx.shadowColor = '#ffd700';
    cx.shadowBlur  = 16 + Math.sin(frame * 0.4) * 8;
    cx.beginPath(); cx.arc(px, py, 62, 0, Math.PI * 2); cx.stroke();
    // 남은 시간에 따라 링 2개
    if (P.invincibleTimer > 60) {
      cx.strokeStyle = `rgba(255,255,200,${auraA * 0.5})`;
      cx.lineWidth = 1.5;
      cx.beginPath(); cx.arc(px, py, 78, 0, Math.PI * 2); cx.stroke();
    }
    cx.restore();
    cx.globalAlpha = 1;
    // 3초 이하 남으면 깜빡임으로 경고
    if (P.invincibleTimer < 180 && blink) cx.globalAlpha = 0.4;
  }

  // 자석 오라 — 흡수 반경 시각화
  if (P.magnetTimer > 0) {
    const mA = 0.12 + Math.sin(frame * 0.2) * 0.06;
    cx.save();
    cx.strokeStyle = `rgba(0,180,255,${mA + 0.15})`;
    cx.lineWidth = 1.5;
    cx.setLineDash([6, 4]);
    cx.shadowColor = '#00aaff';
    cx.shadowBlur = 8;
    cx.beginPath(); cx.arc(px, py, 200, 0, Math.PI * 2); cx.stroke();
    cx.setLineDash([]);
    cx.restore();
    cx.globalAlpha = 1;
    if (P.magnetTimer < 180) cx.globalAlpha = 0.5 + Math.sin(frame * 0.4) * 0.5;
  }

  // 콤보 타이머 링 — 3초 안에 먹어야 콤보 유지
  if (combo > 0 && comboT > 0) {
    const timerPct = comboT / COMBO_TIMER;
    const ringR = 68;
    const tierInfo = COMBO_TIERS.slice().reverse().find(t => combo >= t.at);
    const ringCol = timerPct > 0.5 ? (tierInfo ? tierInfo.col : '#ffffff')
                  : timerPct > 0.25 ? '#ff9900' : '#ff2200';
    cx.save();
    cx.strokeStyle = ringCol;
    cx.lineWidth = timerPct < 0.3 ? 3 : 2;
    cx.globalAlpha = 0.55 + timerPct * 0.35;
    if (timerPct < 0.3) { cx.shadowColor = ringCol; cx.shadowBlur = 8; }
    cx.beginPath();
    cx.arc(px, py, ringR, -Math.PI / 2, -Math.PI / 2 + timerPct * Math.PI * 2);
    cx.stroke();
    cx.restore();
    cx.globalAlpha = 1;
  }
}

// ── 아이템 드로우 ─────────────────────────────────
function drawItemImg(img, x, y, r) {
  if (img && img.complete && img.naturalWidth > 0) {
    const ratio = img.naturalHeight / img.naturalWidth, w = r*2, h = w*ratio;
    cx.drawImage(img, x - w/2, y - h/2, w, h);
  }
}

function drawItems() {
  items.forEach(it => {
    const r = 26;
    if (it.kind === 'obs') {
      if (it.obsType === 'damage') {
        // 타이어 — 빨간 glow
        if (tireReady) {
          const aspect = tireImg.naturalHeight / tireImg.naturalWidth;
          const w = r * 2.4, h = w * aspect;
          const glowAmt = 14 + Math.sin(frame * 0.18 + it.y * 0.05) * 8;
          cx.shadowColor = '#ff2200'; cx.shadowBlur = glowAmt;
          cx.drawImage(tireImg, it.x - w/2, it.y - h/2, w, h);
          cx.shadowBlur = 0;
        } else {
          cx.font=`${r*1.4}px serif`; cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText('🛞',it.x,it.y);
        }
      }
    } else if (it.kind === 'bonus') {
      if (it.bonusType === 'invincible') {
        // 4프레임 날개 애니 (4게임프레임씩 = 3.75 팔락/초)
        const fIdx = Math.floor((it.animFrame || 0) / 4) % 4;
        const img  = invincibleImgs[fIdx];
        const glowAmt = 10 + Math.abs(Math.sin((it.animFrame||0) * 0.25)) * 18;
        cx.shadowColor = '#ffd700'; cx.shadowBlur = glowAmt;
        if (img && img.complete && img.naturalWidth > 0) {
          const aspect = img.naturalHeight / img.naturalWidth;
          const w = r * 2.4, h = w * aspect;
          cx.drawImage(img, it.x - w/2, it.y - h/2, w, h);
        } else {
          cx.font = `${r*1.4}px serif`; cx.textAlign='center'; cx.textBaseline='middle';
          cx.fillText('🛡', it.x, it.y);
        }
        cx.shadowBlur = 0;
        // "무적!" 배지
        cx.save();
        cx.fillStyle = 'rgba(255,215,0,0.95)';
        cx.beginPath(); cx.roundRect(it.x - 32, it.y - r - 2, 64, 16, 5); cx.fill();
        cx.font = 'bold 10px Pretendard, -apple-system, sans-serif';
        cx.fillStyle = '#000'; cx.textAlign='center'; cx.textBaseline='middle';
        cx.fillText('SUPER JORY', it.x, it.y - r + 6);
        cx.restore();
      } else if (it.bonusType === 'golden_time') {
        // glow만 켜졌다 꺼졌다 — 이미지 크기는 고정 (음식과 동일)
        const glowAmt = 8 + Math.abs(Math.sin(frame * 0.18 + it.y * 0.03)) * 22;
        cx.shadowColor = '#f5c400';
        cx.shadowBlur  = glowAmt;
        const img = bonusImgs.golden_time;
        if (img.complete && img.naturalWidth > 0) {
          const aspect = img.naturalHeight / img.naturalWidth;
          const w = r * 2, h = w * aspect; // 음식과 동일 크기
          cx.drawImage(img, it.x - w/2, it.y - h/2, w, h);
        } else {
          cx.font=`${r}px serif`; cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText('✨',it.x,it.y);
        }
        cx.shadowBlur = 0;
        // "시간 추가!" 텍스트 배지
        cx.save();
        cx.fillStyle = 'rgba(245,196,0,0.92)';
        cx.beginPath(); cx.roundRect(it.x - 28, it.y - r - 2, 56, 16, 5); cx.fill();
        cx.font = 'bold 10px Pretendard, -apple-system, sans-serif';
        cx.fillStyle = '#000'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillText('시간 추가!', it.x, it.y - r + 6);
        cx.restore();
      } else if (it.bonusType === 'magnet') {
        const glowAmt = 10 + Math.abs(Math.sin(frame * 0.22 + it.y * 0.04)) * 20;
        cx.shadowColor = '#00aaff'; cx.shadowBlur = glowAmt;
        if (magnetImg.complete && magnetImg.naturalWidth > 0) {
          const aspect = magnetImg.naturalHeight / magnetImg.naturalWidth;
          const w = r * 2.2, h = w * aspect;
          cx.drawImage(magnetImg, it.x - w/2, it.y - h/2, w, h);
        } else {
          cx.font=`${r*1.4}px serif`; cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText('🧲',it.x,it.y);
        }
        cx.shadowBlur = 0;
        cx.save();
        cx.fillStyle = 'rgba(0,170,255,0.92)';
        cx.beginPath(); cx.roundRect(it.x - 28, it.y - r - 2, 56, 16, 5); cx.fill();
        cx.font = 'bold 10px Pretendard, -apple-system, sans-serif';
        cx.fillStyle = '#fff'; cx.textAlign='center'; cx.textBaseline='middle';
        cx.fillText('MAGNET', it.x, it.y - r + 6);
        cx.restore();
      }
    } else {
      drawItemImg(foodImgs[it.foodIdx], it.x, it.y, r);
      // ×2, ×3 배율 배지
      if (it.foodMult > 1) {
        const label = `×${it.foodMult}`;
        const col = it.foodMult >= 3 ? '#ff5500' : COL.gold;
        cx.save();
        cx.fillStyle = col;
        cx.beginPath(); cx.roundRect(it.x - 14, it.y - r + 1, 28, 16, 5); cx.fill();
        cx.font = 'bold 11px Pretendard, -apple-system, sans-serif';
        cx.fillStyle = '#000'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillText(label, it.x, it.y - r + 9);
        cx.restore();
      }
    }
  });
}

// ── 파티클 드로우 ─────────────────────────────────
function drawFX() {
  particles.forEach(p => {
    cx.globalAlpha = p.alpha; cx.fillStyle = p.col;
    cx.beginPath(); cx.arc(p.x, p.y, p.sz, 0, Math.PI*2); cx.fill();
  });
  // 점수 HUD 호밍 파티클
  scoreParticles.forEach(p => {
    const a = Math.max(0, 1 - p.life / 80);
    cx.globalAlpha = a;
    cx.fillStyle = p.col;
    cx.shadowColor = p.col; cx.shadowBlur = 6;
    cx.beginPath(); cx.arc(p.x, p.y, p.sz, 0, Math.PI*2); cx.fill();
    cx.shadowBlur = 0;
  });
  cx.globalAlpha = 1;
  popups.forEach(p => {
    cx.globalAlpha = p.alpha; btxt(p.txt, p.x, p.y, 13, p.col);
  });
  cx.globalAlpha = 1;
}

// ── 특수 이펙트 ───────────────────────────────────
function drawSpecialFX() {
  if (timeLeft < 600) {
    const a = 0.15 + Math.sin(frame * 0.35) * 0.15;
    cx.strokeStyle = `rgba(255,51,51,${a})`; cx.lineWidth = 6;
    cx.strokeRect(4, 4, W-8, H-8);
  }
}

// ── 긴박 메시지 (HURRY UP! 등) ───────────────────────
function drawUrgentMsg() {
  if (!urgentMsg || urgentMsg.life <= 0) return;
  const { text, col, life, maxLife } = urgentMsg;
  const t = life / maxLife; // 1→0
  // 등장: slam-in (scale 2.0→1.0), 퇴장: fade out
  const progress = 1 - t; // 0→1 경과
  const scaleIn  = progress < 0.2 ? 2.0 - (progress / 0.2) : 1.0;
  const alpha    = t < 0.25 ? t / 0.25 : 1.0;
  const y        = H * 0.38;

  cx.save();
  cx.globalAlpha = alpha;
  cx.translate(W/2, y);
  cx.scale(scaleIn, scaleIn);

  // 텍스트 쉐도우 glow
  cx.shadowColor = col;
  cx.shadowBlur  = 18 + Math.sin(frame * 0.4) * 6;
  cx.font = `900 22px Pretendard, -apple-system, sans-serif`;
  cx.fillStyle = col;
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(text, 0, 0);

  cx.restore();
  cx.globalAlpha = 1;
}

// ── 시작 화면 ─────────────────────────────────────
function drawStart() {
  const joriY = 195 + Math.sin(frame * 0.04) * 7;
  cx.shadowColor = COL.primary; cx.shadowBlur = 30;
  drawJori(W/2, joriY, 55); cx.shadowBlur = 0;
  rrect(W/2-36, joriY+50, 72, 22, 11, 'rgba(250,0,80,0.15)', COL.primary, 1);
  btxt('조리', W/2, joriY+61, 12, COL.primary);

  btxt('요기요 런', W/2, 308, 32, COL.white);
  txt('시즌 챌린지 · 고득점으로 랭킹에 도전하세요', W/2, 336, 12, 'rgba(255,255,255,0.45)');

  rrect(40, 368, W-80, 58, 10, 'rgba(255,255,255,0.04)');
  txt('화면 터치 또는 ← → 키로 좌우 자유이동', W/2, 390, 11, 'rgba(255,255,255,0.5)');
  const fds = ['🍗','🍕','🍔','🌮','🥗'];
  fds.forEach((f, i) => em(f, 80+i*44, 413, 22));
  txt('음식 모으기 = 점수 UP   🚧 장애물 = 라이프 DOWN', W/2, 435, 10, 'rgba(255,255,255,0.3)');

  rrect(W/2-80, 452, 160, 22, 11, `${COL.time}22`, COL.time, 0.8);
  txt('⏰ 시계 아이템으로 시간 연장!', W/2, 463, 10, COL.time);

  const by = 520, pulse = 1 + Math.sin(frame * 0.07) * 0.025;
  cx.save(); cx.translate(W/2, by); cx.scale(pulse, pulse);
  rrect(-110, -24, 220, 48, 24, COL.primary);
  btxt('게임 시작', 0, 0, 17, '#fff'); cx.restore();

  if (hi > 0) { em('🏆', W/2-55, 590, 16); txt(`최고 기록  ${hi.toLocaleString()}`, W/2+10, 590, 13, COL.gold); }
}

// ── EXTRA TIME! 연출 ──────────────────────────────
// 총 150프레임 (2.5초)
// 150-110: 금빛 플래시 + 슬로우
// 110-40:  "EXTRA TIME!" 텍스트 슬램인
// 40-0:    페이드아웃
function drawExtraTime() {
  if (extraTimeAnim <= 0) return;
  const t = extraTimeAnim; // 150→0

  // ① 금빛 스크린 플래시 (150~100 구간)
  if (t > 100) {
    const flashA = (t - 100) / 50 * 0.55; // 0→0.55→0
    cx.fillStyle = `rgba(245,196,0,${flashA})`;
    cx.fillRect(0, 0, W, H);
  }

  // ② 테두리 금빛 펄스 (전 구간)
  const borderA = Math.min(t / 40, 1) * 0.8;
  cx.strokeStyle = `rgba(245,196,0,${borderA})`;
  cx.lineWidth = 12;
  cx.strokeRect(6, 6, W - 12, H - 12);

  // ③ "EXTRA TIME!" 텍스트 슬램인 (110~0 구간)
  if (t < 115) {
    const progress = Math.min((115 - t) / 30, 1); // 0→1 (슬램인)
    // ease-out: 처음엔 크게, 빠르게 안착
    const eased = 1 - Math.pow(1 - progress, 3);
    const scale = 2.8 - eased * 1.8; // 2.8→1.0

    // 페이드: t < 40부터 사라짐
    const fadeA = t < 40 ? t / 40 : 1;

    cx.save();
    cx.translate(W / 2, H / 2 - 20);
    cx.scale(scale, scale);
    cx.globalAlpha = fadeA;

    // 글로우
    cx.shadowColor = '#f5c400';
    cx.shadowBlur  = 30 + Math.sin(frame * 0.3) * 10;

    // 메인 텍스트
    cx.font = `bold 38px Pretendard, -apple-system, sans-serif`;
    cx.fillStyle = '#fff';
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    cx.fillText('EXTRA TIME!', 0, 0);

    // 금색 아웃라인
    cx.strokeStyle = '#f5c400';
    cx.lineWidth = 2 / scale;
    cx.strokeText('EXTRA TIME!', 0, 0);

    cx.shadowBlur = 0;
    cx.restore();
    cx.globalAlpha = 1;

    // 서브 텍스트 "TIME FULLY RESTORED"
    if (t < 80 && t > 20) {
      const subA = Math.min((80 - t) / 20, 1) * (t / 20);
      cx.globalAlpha = Math.min(subA, fadeA) * 0.85;
      cx.font = `bold 13px Pretendard, -apple-system, sans-serif`;
      cx.fillStyle = '#ffe066';
      cx.textAlign = 'center';
      cx.textBaseline = 'middle';
      cx.fillText('TIME FULLY RESTORED', W / 2, H / 2 + 28);
      cx.globalAlpha = 1;
    }
  }
}

// ── 게임오버 화면 ─────────────────────────────────
function drawOver() {
  cx.fillStyle = 'rgba(10,14,26,0.82)'; cx.fillRect(0, 0, W, H);
  cx.save(); cx.translate(W/2, 178); cx.rotate(Math.PI); drawJori(0,0,40); cx.restore();
  btxt('GAME OVER', W/2, 258, 26, COL.white);
  rrect(50, 285, W-100, 100, 14, 'rgba(255,255,255,0.06)', 'rgba(255,255,255,0.1)', 1);
  btxt(score.toLocaleString(), W/2, 325, 38, COL.gold);
  txt('이번 기록', W/2, 362, 11, 'rgba(255,255,255,0.35)');
  if (score > 0 && score >= hi) {
    cx.shadowColor = COL.gold; cx.shadowBlur = 20; btxt('🏆 신기록!', W/2, 400, 14, COL.gold); cx.shadowBlur = 0;
  } else if (hi > 0) {
    txt(`최고 기록  ${hi.toLocaleString()}`, W/2, 400, 12, 'rgba(255,255,255,0.3)');
  }
  rrect(40, 422, W-80, 68, 12, 'rgba(245,196,0,0.08)', 'rgba(245,196,0,0.25)', 1);
  em('🏅', 66, 451, 18);
  btxt('이 점수가 시즌 랭킹에 반영됩니다', W/2+10, 443, 12, 'rgba(255,255,255,0.75)');
  txt('강남구 치킨 랭킹 · 이번 달 23위 → 도전!', W/2+10, 465, 11, 'rgba(255,255,255,0.35)');
  txt('혜택탭에서 순위 확인 및 쿠폰 수령 가능', W/2+10, 481, 10, 'rgba(245,196,0,0.5)');
  const by = 554, pulse = 1 + Math.sin(frame * 0.09) * 0.02;
  cx.save(); cx.translate(W/2, by); cx.scale(pulse, pulse);
  rrect(-110, -24, 220, 48, 24, COL.primary); btxt('다시 도전', 0, 0, 17, '#fff'); cx.restore();
}

// ── 메인 루프 ─────────────────────────────────────
function loop() {
  update();
  drawBG();
  drawItems();
  drawFX();
  if (S === 'play' || S === 'over' || S === 'dead') drawPlayer();
  if (S === 'play')  { drawSpecialFX(); drawHUD(); drawUrgentMsg(); drawExtraTime(); }
  if (S === 'start') drawStart();
  if (S === 'over')  { drawHUD(); drawOver(); }
  requestAnimationFrame(loop);
}

loop();
</script>

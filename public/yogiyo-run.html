const DPR = window.devicePixelRatio || 1;
C.width = W * DPR; C.height = H * DPR;
cx.scale(DPR, DPR);

// ── 상수 ──────────────────────────────────────────
const PLAYER_SPEED = 3.6;  // 최대 속도 px/frame
const PLAYER_ACCEL = 3.6; // 가속도 (이징 없음 — 즉시 최대속도)
const PLAYER_FRIC  = 0.0; // 마찰 없음 (즉시 정지)
const PLAYER_Y_MIN = 160;  // 세로 이동 상한
const PLAYER_Y_MAX = 600;  // 세로 이동 하한

const OBS_TYPES   = ['damage']; // reverse/blind 제거
const BONUS_TYPES = [];         // magnet/slow/fever/dash 제거 — golden_time만 별도 스폰
// golden_time은 별도 희귀 스폰으로 관리 (10초 남을 때 1회)

// 콤보 마일스톤: [임계값, 배율, 색상, 메시지]
const COMBO_TIERS = [
  { at:   5, mult:  2, col: '#ffd700', msg: 'COMBO ×5! 🔥'    },
  { at:  10, mult:  3, col: '#ff9900', msg: 'COMBO ×10!! 🔥🔥' },
  { at:  20, mult:  5, col: '#ff5500', msg: 'COMBO ×20!!! 🔥'  },
  { at:  30, mult:  8, col: '#ff2200', msg: 'COMBO ×30!! 💥'   },
  { at:  60, mult: 12, col: '#ff0055', msg: 'COMBO ×60!!! 💥💥' },
  { at: 100, mult: 20, col: '#cc00ff', msg: 'LEGENDARY ×100 ✨' },
];
function getComboMult(c) {
  let m = 1;
  for (const t of COMBO_TIERS) { if (c >= t.at) m = t.mult; }
  return m;
}
const COMBO_TIMER = 180; // 3초 = 180프레임

// ── Wave Pacing (Nintendo 스타일 긴장/이완 리듬) ──────────
// 60초 게임을 7개 웨이브로 구성: 긴장 → 이완 → 더 큰 긴장 → 보상
const WAVES = [
  { start: 0,    name: 'TUTORIAL',   obsRate: 0.04, foodRate: 0.88, spawnInterval: 52, pairRate: 0,   speedMult: 0.70, patternInterval: 0 },
  { start: 600,  name: 'FIRST_PUSH', obsRate: 0.16, foodRate: 0.68, spawnInterval: 44, pairRate: 650, speedMult: 0.85, patternInterval: 380 },
  { start: 1200, name: 'BREATHER',   obsRate: 0.05, foodRate: 0.92, spawnInterval: 36, pairRate: 0,   speedMult: 0.75, patternInterval: 280 },
  { start: 1500, name: 'INTENSITY',  obsRate: 0.28, foodRate: 0.54, spawnInterval: 30, pairRate: 450, speedMult: 1.10, patternInterval: 260 },
  { start: 2100, name: 'RELIEF',     obsRate: 0.10, foodRate: 0.78, spawnInterval: 38, pairRate: 0,   speedMult: 0.85, patternInterval: 320 },
  { start: 2400, name: 'FINAL_PUSH', obsRate: 0.33, foodRate: 0.48, spawnInterval: 24, pairRate: 350, speedMult: 1.20, patternInterval: 200 },
  { start: 3000, name: 'LAST_STAND', obsRate: 0.36, foodRate: 0.55, spawnInterval: 22, pairRate: 280, speedMult: 1.35, patternInterval: 160 },
];

function getCurrentWave() {
  for (let i = WAVES.length - 1; i >= 0; i--) {
    if (frame >= WAVES[i].start) return WAVES[i];
  }
  return WAVES[0];
}

// ── Spawn Patterns (의도적 배치 — Risk-Reward Spatial Design) ─
const PATTERNS = {
  corridor: [ // 양 옆 장애물, 가운데 좁은 통로에 음식
    { dx: -100, dy: 0, kind: 'obs' }, { dx: 100, dy: 0, kind: 'obs' },
    { dx: 0, dy: 8, kind: 'food' }, { dx: -15, dy: 18, kind: 'food' }, { dx: 15, dy: 28, kind: 'food' },
  ],
  cascade: [ // 대각선 음식 → 끝에 장애물 (따라가면 콤보, 끝에 함정)
    { dx: -80, dy: 0, kind: 'food' }, { dx: -40, dy: 12, kind: 'food' },
    { dx: 0, dy: 24, kind: 'food' }, { dx: 40, dy: 36, kind: 'food' },
    { dx: 80, dy: 48, kind: 'food' }, { dx: 100, dy: 64, kind: 'obs' },
  ],
  trap: [ // 고배율 음식(×3) 주변에 장애물 — 갈 것인가 말 것인가
    { dx: 0, dy: 0, kind: 'food', foodMult: 3 },
    { dx: -55, dy: -8, kind: 'obs' }, { dx: 55, dy: -8, kind: 'obs' },
    { dx: -40, dy: 22, kind: 'obs' }, { dx: 40, dy: 22, kind: 'obs' },
  ],
  freebie: [ // 순수 보상 — 장애물 없이 음식만
    { dx: -60, dy: 0, kind: 'food' }, { dx: 0, dy: 0, kind: 'food' }, { dx: 60, dy: 0, kind: 'food' },
    { dx: -30, dy: 14, kind: 'food' }, { dx: 30, dy: 14, kind: 'food' },
  ],
  vformation: [ // V자 장애물 대형 — 패턴 인식으로 회피
    { dx: 0, dy: 0, kind: 'obs' },
    { dx: -50, dy: 18, kind: 'obs' }, { dx: 50, dy: 18, kind: 'obs' },
    { dx: -100, dy: 36, kind: 'obs' }, { dx: 100, dy: 36, kind: 'obs' },
  ],
  xformation: [ // X자 장애물 + 중앙 고배율 음식
    { dx: -75, dy: 0, kind: 'obs' }, { dx: 75, dy: 0, kind: 'obs' },
    { dx: 0, dy: 18, kind: 'food', foodMult: 2 },
    { dx: 75, dy: 36, kind: 'obs' }, { dx: -75, dy: 36, kind: 'obs' },
  ],
};

// 웨이브별 패턴 풀 — 각 웨이브에 어울리는 패턴 선택
const WAVE_PATTERNS = {
  TUTORIAL:   ['freebie'],
  FIRST_PUSH: ['corridor', 'cascade'],
  BREATHER:   ['freebie', 'cascade'],
  INTENSITY:  ['trap', 'vformation', 'corridor'],
  RELIEF:     ['freebie', 'cascade'],
  FINAL_PUSH: ['vformation', 'xformation', 'trap', 'corridor'],
  LAST_STAND: ['trap', 'xformation', 'vformation'],
};

// ── Near Miss Bonus ────────────────────────────────────
const NEAR_MISS_RADIUS = 15;  // hitR + 이 범위 이내 통과 시 보너스
const NEAR_MISS_POINTS = 25;
const NEAR_MISS_Y_MARGIN = 22; // 플레이어 Y 레벨 판정 범위

// ── Score Gate Events (마일스톤 슬로모션) ───────────────
const SCORE_GATES = [500, 1000, 2000, 3500];
const SLOWMO_DURATION = 180;  // 3초
const SLOWMO_FACTOR = 0.35;   // 속도 35%

// ── Rubber Banding ─────────────────────────────────────
const RUBBER_BAND_MULT = 0.88; // 라이프 1 → 장애물 12% 감속

// ── Adaptive Difficulty ────────────────────────────────
const ADAPT_WINDOW = 600;      // 10초 슬라이딩 윈도우
const ADAPT_EASE_HITS = 3;     // 10초 내 3회 피격 → 난이도↓
const ADAPT_PUSH_COMBO = 20;   // 10초 내 콤보 20+ → 난이도↑

const COL = {
  bg: '#0a0e1a', primary: '#fa0050', gold: '#f5c400',
  green: '#05c896', white: '#ffffff', time: '#00d4ff',
};

// ── 상태 ──────────────────────────────────────────
let S = 'start';
let score = 0, hi = 0, lives = 3, frame = 0, timeLeft = 0;
let baseSpeed = 4, combo = 0, comboT = 0;
let items = [], particles = [], popups = [];
let scoreParticles = []; // 점수 HUD로 날아가는 파티클
let scorePop = 0;        // 점수 띠용 bounce 타이머
let extraTimeAnim = 0;        // EXTRA TIME! 연출 카운트다운 (150프레임)
let goldenSpawned = false;    // 이번 게임에서 황금 물약 스폰 여부
let invincibleOnScreen = false; // 무적 포션 중복 방지
let magnetOnScreen = false;     // 자석 포션 중복 방지
// 긴박 메시지 — Temple Run / Subway Surfers 스타일
let urgentMsg = null;    // { text, col, life, maxLife }
let lastUrgentSec = -1; // 중복 방지용 마지막 표시 초

// Wave & Pattern 상태
let lastPatternFrame = 0;
// Near Miss
let nearMissCount = 0;
// Score Gate (슬로모션)
let scoreGatesHit = [];
let slowmoTimer = 0;
// Adaptive Difficulty
let adaptHits = [];     // 피격 프레임 기록
let adaptMult = 1.0;    // 0.7(쉬움) ~ 1.3(어려움)

// ── 플레이어 ──────────────────────────────────────
const P = {
  x: W / 2, y: 500,
  vx: 0, vy: 0,    // 수평/수직 속도 (자유이동)
  inv: 0, shake: 0, bump: 0,
  dir: 0,           // 방향 (-1=left, 0=straight, 1=right) - 뱅킹 애니용
  reverseTimer: 0, blindTimer: 0,
  magnetTimer: 0,  slowTimer: 0,
  feverTimer: 0,   dashTimer: 0,
  invincibleTimer: 0,  // 무적 타이머 (프레임)
};

// ── 입력 ──────────────────────────────────────────
const keys = {};
// 조이스틱 상태
const joystick = { active: false, startX: 0, startY: 0, dx: 0, dy: 0 };
const JOYSTICK_RADIUS = 60; // 최대 드래그 반경 (px, 캔버스 좌표)

// 한/영 키 매핑 (wasd ↔ ㅈㅁㄴㅇ)
const KO_MAP = { 'ㅈ': 'w', 'ㅁ': 'a', 'ㄴ': 's', 'ㅇ': 'd' };
function normalizeKey(k) { return KO_MAP[k] || k; }

document.addEventListener('keydown', e => {
  const k = normalizeKey(e.key);
  keys[k] = true;
  if ((k === ' ' || k === 'Enter') && S !== 'play') startGame();
});
document.addEventListener('keyup', e => { keys[normalizeKey(e.key)] = false; });

function toCanvas(clientX, clientY) {
  const rect = C.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (W / rect.width),
    y: (clientY - rect.top)  * (H / rect.height),
  };
}

// ── 터치 조이스틱 ──────────────────────────────────
C.addEventListener('touchstart', e => {
  e.preventDefault();
  if (S !== 'play') { startGame(); return; }
  const { x, y } = toCanvas(e.touches[0].clientX, e.touches[0].clientY);
  joystick.active = true;
  joystick.startX = x; joystick.startY = y;
  joystick.dx = 0;     joystick.dy = 0;
}, { passive: false });

C.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!joystick.active) return;
  const { x, y } = toCanvas(e.touches[0].clientX, e.touches[0].clientY);
  joystick.dx = x - joystick.startX;
  joystick.dy = y - joystick.startY;
}, { passive: false });

C.addEventListener('touchend', e => {
  e.preventDefault();
  joystick.active = false; joystick.dx = 0; joystick.dy = 0;
}, { passive: false });

// ── 마우스 조이스틱 ────────────────────────────────
C.addEventListener('mousedown', e => {
  if (S !== 'play') { startGame(); return; }
  const { x, y } = toCanvas(e.clientX, e.clientY);
  joystick.active = true;
  joystick.startX = x; joystick.startY = y;
  joystick.dx = 0;     joystick.dy = 0;
});

C.addEventListener('mousemove', e => {
  if (!joystick.active) return;
  const { x, y } = toCanvas(e.clientX, e.clientY);
  joystick.dx = x - joystick.startX;
  joystick.dy = y - joystick.startY;
});

C.addEventListener('mouseup', () => {
  joystick.active = false; joystick.dx = 0; joystick.dy = 0;
});
C.addEventListener('mouseleave', () => {
  joystick.active = false; joystick.dx = 0; joystick.dy = 0;
});

// ── 이동 처리 (슈팅게임식 자유이동) ────────────────
function processInput() {
  if (S !== 'play') return;

  const speed = PLAYER_SPEED * (P.dashTimer > 0 ? 1.7 : 1) * (P.invincibleTimer > 0 ? 2 : 1);

  if (joystick.active) {
    // 조이스틱: 드래그 방향/거리로 속도 결정
    const dist = Math.sqrt(joystick.dx ** 2 + joystick.dy ** 2);
    const ratio = Math.min(dist / JOYSTICK_RADIUS, 1);
    if (dist > 4) {
      P.vx = (joystick.dx / dist) * speed * ratio;
      P.vy = (joystick.dy / dist) * speed * ratio;
    } else {
      P.vx = 0; P.vy = 0;
    }
  } else {
    // 키보드: 가속 + 마찰 (수평)
    let dir = 0;
    if (keys['ArrowLeft']  || keys['a'] || keys['A']) dir = -1;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) dir =  1;
    if (P.reverseTimer > 0) dir *= -1;

    P.vx = dir !== 0 ? dir * speed : 0;

    // 키보드: 수직
    let dirY = 0;
    if (keys['ArrowUp']   || keys['w'] || keys['W']) dirY = -1;
    if (keys['ArrowDown'] || keys['s'] || keys['S']) dirY =  1;
    if (P.reverseTimer > 0) dirY *= -1;

    P.vy = dirY !== 0 ? dirY * speed : 0;
  }
}

// ── 게임 시작 ──────────────────────────────────────
function startGame() {
  S = 'play';
  score = 0; lives = 3; frame = 0; timeLeft = TIME_INIT;
  baseSpeed = 4; combo = 0; comboT = 0;
  items = []; particles = []; popups = [];
  P.x = W / 2; P.y = 500; P.vx = 0; P.vy = 0;
  P.inv = 0; P.shake = 0; P.bump = 0; P.dir = 0;
  P.reverseTimer = 0; P.blindTimer = 0; P.magnetTimer = 0;
  P.slowTimer = 0; P.feverTimer = 0; P.dashTimer = 0;
  extraTimeAnim = 0; goldenSpawned = false; invincibleOnScreen = false; magnetOnScreen = false;
  scoreParticles = []; scorePop = 0;
  urgentMsg = null; lastUrgentSec = -1;
  P.invincibleTimer = 0;
  // 레벨 디자인 시스템 초기화
  lastPatternFrame = 0;
  nearMissCount = 0;
  scoreGatesHit = [];
  slowmoTimer = 0;
  adaptHits = [];
  adaptMult = 1.0;
}

// ── 스폰 (Wave Pacing + Pattern Spawning) ──────────────

function randX(margin = 30) {
  return margin + Math.random() * (W - margin * 2);
}

// 기존 아이템과 겹치는지 검사 (화면 상단 영역만 체크)
function hasOverlap(x, y, minDist = 70) {
  return items.some(it => {
    const dx = it.x - x, dy = it.y - y;
    return Math.sqrt(dx*dx + dy*dy) < minDist;
  });
}
function safeX(margin = 40, minDist = 70, spawnY = -40) {
  for (let i = 0; i < 8; i++) {
    const x = randX(margin);
    if (!hasOverlap(x, spawnY, minDist)) return x;
  }
  return randX(margin); // 8회 시도 후 포기
}


function makeItem(x, kind, obsType, bonusType, overrideFoodMult) {
  const wave = getCurrentWave();
  const fRand = Math.random();
  const foodMult = overrideFoodMult || (kind === 'food' ? (fRand < 0.05 ? 3 : fRand < 0.30 ? 2 : 1) : 1);
  const waveSpdMult = wave.speedMult;
  return {
    x, y: -50,
    kind,
    foodIdx:   kind === 'food'  ? Math.floor(Math.random() * foodImgs.length) : -1,
    foodMult,
    obsType:   obsType   || null,
    bonusType: bonusType || null,
    spd: kind === 'food'
      ? (2.4 + Math.random() * 0.53) * waveSpdMult
      : baseSpeed * (0.38 + Math.random() * 0.12) * waveSpdMult,
    r: 22,
    nearMissed: false, // Near Miss 중복 방지
  };
}

// Wave 기반 스폰 — 웨이브별 obsRate/foodRate + Adaptive 보정
function spawn() {
  const wave = getCurrentWave();
  // Adaptive 보정: adaptMult가 높으면 장애물↑음식↓, 낮으면 반대
  const obsChance  = Math.min(0.45, wave.obsRate * adaptMult);
  const foodChance = Math.max(0.30, wave.foodRate * (2 - adaptMult));

  const rand = Math.random();
  let kind = null;
  if (rand < obsChance)                  kind = 'obs';
  else if (rand < obsChance + foodChance) kind = 'food';
  if (!kind) return;

  const x = safeX(40, 65);
  items.push(makeItem(x, kind, kind === 'obs' ? 'damage' : null, null));
}

// 장애물 페어 스폰 — 웨이브에 pairRate 있을 때만
function spawnPair() {
  const wave = getCurrentWave();
  if (wave.pairRate <= 0) return;
  const spd = baseSpeed * (0.38 + Math.random() * 0.12) * wave.speedMult;
  const side = Math.random() < 0.5 ? 0 : 1;
  const base = side === 0 ? 55 : W - 55;
  const spread = 55;
  for (let i = 0; i < 2; i++) {
    const x = base + (i === 0 ? -spread * 0.3 : spread * 0.3) * (side === 0 ? 1 : -1);
    if (hasOverlap(x, -40, 65)) continue;
    const it = makeItem(x, 'obs', 'damage', null);
    it.spd = spd;
    items.push(it);
  }
}

// ── Pattern Spawning (의도적 배치) ─────────────────────
function spawnPattern() {
  const wave = getCurrentWave();
  if (wave.patternInterval <= 0) return;
  if (frame - lastPatternFrame < wave.patternInterval) return;

  const pool = WAVE_PATTERNS[wave.name] || ['freebie'];
  const patternName = pool[Math.floor(Math.random() * pool.length)];
  const pattern = PATTERNS[patternName];
  if (!pattern) return;

  lastPatternFrame = frame;
  const centerX = 80 + Math.random() * (W - 160); // 패턴 중심 X

  for (const p of pattern) {
    const x = Math.max(30, Math.min(W - 30, centerX + p.dx));
    const it = makeItem(x, p.kind, p.kind === 'obs' ? 'damage' : null, null, p.foodMult || undefined);
    it.y = -50 - p.dy * 4; // dy를 프레임 간격으로 → Y 오프셋으로 변환
    items.push(it);
  }
}

// ── 파티클 ────────────────────────────────────────
function burst(x, y, col, n = 10) {
  if (particles.length > 80) return; // 상한 제한
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 / n) * i, s = 2 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, alpha: 1, col, sz: 3 + Math.random()*3 });
  }
}

function popup(x, y, t, col) {
  popups.push({ x, y, txt: t, col, alpha: 1, vy: -1.8 });
}

// ── 업데이트 ──────────────────────────────────────
function update() {
  frame++; // start/over 화면 애니메이션용으로 항상 증가
  if (S !== 'play') return;

  // EXTRA TIME 연출 카운트다운
  if (extraTimeAnim > 0) extraTimeAnim--;

  // 슬로모션 타이머 감소
  if (slowmoTimer > 0) slowmoTimer--;

  // 타이머 (연출 중 일시 슬로우 / Score Gate 슬로모션)
  const timerFrozen = extraTimeAnim > 90; // 연출 초반 1.5초간 시간 멈춤
  if (!timerFrozen) {
    // 슬로모션 중에도 시간은 정상 감소 (게임 시간은 아끼지 않음 — 연출용)
    if (timeLeft > 0) timeLeft--;
    else { S = 'over'; if (score > hi) hi = score; return; }
  }

  // ── 긴박 메시지 트리거 (Temple Run / Subway Surfers 스타일) ───
  if (urgentMsg && urgentMsg.life > 0) urgentMsg.life--;
  const secs = Math.ceil(timeLeft / 60);
  function showUrgent(text, col) {
    if (lastUrgentSec !== secs) { urgentMsg = { text, col, life: 90, maxLife: 90 }; lastUrgentSec = secs; }
  }
  if (!timerFrozen) {
    if (secs === 30) showUrgent('HURRY UP!', '#ff9900');
    else if (secs === 20) showUrgent('TIME IS RUNNING OUT!', '#ff5500');
    else if (secs === 15) showUrgent('KEEP GOING!', '#ff3300');
    else if (secs === 10) showUrgent('LAST CHANCE!', '#ff0000');
    else if (secs <=  5 && secs > 0 && secs !== lastUrgentSec) showUrgent(`${secs}...`, '#ff0000');
  }
  if (combo >= 5  && combo % 5 === 0 && comboT === 69) showUrgent(`×${combo} COMBO!! 🔥`, COL.gold);
  if (lives === 1 && frame % 300 === 1) { urgentMsg = { text: '⚠️ LAST LIFE!', col: COL.primary, life: 80, maxLife: 80 }; }

  // 황금 물약 — 10초 남았을 때 1회만 스폰 (느리게 내려옴)
  if (!goldenSpawned && timeLeft <= 600 && timeLeft > 0) {
    goldenSpawned = true;
    const gt = makeItem(safeX(50, 60), 'bonus', null, 'golden_time');
    gt.spd = 1.5; // 천천히 내려오게
    items.push(gt);
  }

  // 무적 포션 — tier2+(25초~) 이후 등장, 최대 1개, 라이프1일때 확률 상승
  if (!invincibleOnScreen && score >= 350 && P.invincibleTimer === 0) {
    const chance = lives === 1 ? 0.0025 : 0.0007; // 라이프1: ~6초마다 / 정상: ~24초마다
    if (Math.random() < chance) {
      const it = makeItem(safeX(70, 80), 'bonus', null, 'invincible');
      it.spd      = 1.0;          // 느린 하강
      it.baseX    = it.x;         // 살랑살랑 기준 X
      it.animFrame = 0;           // 날개 애니 카운터
      it.swayPhase = Math.random() * Math.PI * 2; // 시작 위상 랜덤
      items.push(it);
      invincibleOnScreen = true;
    }
  }

  // 자석 포션 — score 100+ 이후, 최대 1개, magnetTimer 없을 때만
  if (!magnetOnScreen && score >= 100 && P.magnetTimer === 0) {
    const chance = 0.0008; // ~21초마다
    if (Math.random() < chance) {
      const it = makeItem(safeX(50, 70), 'bonus', null, 'magnet');
      it.spd = 1.5;
      it.baseX = it.x;          // 살랑살랑 기준 X
      it.animFrame = 0;         // 프레임 애니 카운터
      it.swayPhase = Math.random() * Math.PI * 2; // 시작 위상 랜덤
      items.push(it);
      magnetOnScreen = true;
    }
  }

  baseSpeed = 3.3 + Math.min(score / 1000, 1) * 4.7; // 3.3 → 8.0 (1/3 faster)

  processInput();

  // 플레이어 위치 적용
  P.x += P.vx;
  P.x = Math.max(20, Math.min(W - 20, P.x));
  P.y += P.vy;
  P.y = Math.max(PLAYER_Y_MIN, Math.min(PLAYER_Y_MAX, P.y));

  // 벽에서 튕기기
  if (P.x <= 20 || P.x >= W - 20) P.vx *= -0.3;
  if (P.y <= PLAYER_Y_MIN || P.y >= PLAYER_Y_MAX) P.vy *= -0.3;

  // 방향 뱅킹
  P.dir = P.vx > 1.2 ? 1 : P.vx < -1.2 ? -1 : 0;

  if (P.shake > 0) P.shake--;
  if (P.bump  > 0) P.bump--;
  if (P.inv   > 0) P.inv--;
  if (P.reverseTimer > 0) P.reverseTimer--;
  if (P.blindTimer   > 0) P.blindTimer--;
  if (P.magnetTimer  > 0) P.magnetTimer--;
  if (P.slowTimer    > 0) P.slowTimer--;
  if (P.feverTimer   > 0) P.feverTimer--;
  if (P.dashTimer       > 0) P.dashTimer--;
  if (P.invincibleTimer > 0) P.invincibleTimer--;
  if (comboT > 0) comboT--; else if (combo > 0) { combo = 0; comboT = 0; }

  // ── Wave 기반 스폰 ────────────────────────────────
  const wave = getCurrentWave();
  if (frame % wave.spawnInterval === 0) spawn();

  // 페어 스폰
  if (wave.pairRate > 0 && frame % wave.pairRate === 0) spawnPair();

  // 패턴 스폰 (의도적 배치)
  spawnPattern();

  // ── Adaptive Difficulty 계산 ──────────────────────
  // 슬라이딩 윈도우: 최근 10초 피격 횟수 기반
  adaptHits = adaptHits.filter(f => frame - f < ADAPT_WINDOW);
  if (adaptHits.length >= ADAPT_EASE_HITS) {
    adaptMult = Math.max(0.7, adaptMult - 0.002); // 점진적 완화
  } else if (combo >= ADAPT_PUSH_COMBO) {
    adaptMult = Math.min(1.3, adaptMult + 0.001); // 점진적 강화
  } else {
    // 중립으로 서서히 복귀
    adaptMult += (1.0 - adaptMult) * 0.003;
  }

  items = items.filter(it => {
    let spd = P.invincibleTimer > 0 ? it.spd * 2 : (P.slowTimer > 0 ? it.spd * 0.4 : it.spd);
    // Rubber Banding — 라이프 1일 때 장애물 감속
    if (lives === 1 && it.kind === 'obs') spd *= RUBBER_BAND_MULT;
    // Score Gate 슬로모션
    if (slowmoTimer > 0) spd *= SLOWMO_FACTOR;
    it.y += spd;

    // 무적 포션: 좌우 살랑살랑 이동 + 날개 애니 카운터 증가
    if (it.bonusType === 'invincible') {
      it.animFrame++;
      it.x = it.baseX + Math.sin(it.swayPhase + it.animFrame * (Math.PI * 2 / 150)) * 48;
    }
    // 자석 포션: 좌우 살랑살랑 + 프레임 애니메이션
    if (it.bonusType === 'magnet' && it.animFrame !== undefined) {
      it.animFrame++;
      it.x = it.baseX + Math.sin(it.swayPhase + it.animFrame * (Math.PI * 2 / 120)) * 36;
    }

    // 자석 효과: 음식 아이템을 플레이어 방향으로 당김 (장애물 제외)
    if (P.magnetTimer > 0 && it.kind === 'food') {
      const MAGNET_RADIUS = 200;
      const mdx = P.x - it.x, mdy = P.y - it.y;
      const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
      if (mdist < MAGNET_RADIUS && mdist > 1) {
        const pull = 3.5 * (1 - mdist / MAGNET_RADIUS);
        it.x += (mdx / mdist) * pull;
        it.y += (mdy / mdist) * pull;
      }
    }

    const dx = Math.abs(it.x - P.x);
    const dy = Math.abs(it.y - P.y);
    // 원형 충돌 판정 — 관대한 반지름 (이미지 약간 겹쳐도 허용)
    const hitR = it.kind === 'obs'
      ? (it.obsType === 'damage' ? 42 : 38)  // 장애물: 관대하게 축소
      : it.kind === 'bonus' ? 46
      : (P.magnetTimer > 0 ? 85 : 40);       // 음식: 살짝 넓게
    const dist = Math.sqrt(dx * dx + dy * dy);

    // ── Near Miss Bonus (아슬아슬 회피) ──────────
    if (it.kind === 'obs' && !it.nearMissed && P.inv === 0 && P.invincibleTimer === 0) {
      if (dist > hitR && dist < hitR + NEAR_MISS_RADIUS) {
        it.nearMissed = true;
        nearMissCount++;
        const nmPts = NEAR_MISS_POINTS * getComboMult(combo);
        score += nmPts;
        burst(P.x, P.y, '#00ffaa', 8);
        popup(P.x, P.y - 60, `NEAR MISS! +${nmPts}`, '#00ffaa');
      }
    }

    const colliding = dist < hitR;
    if (!colliding) {
      const alive = it.y < H + 60;
      if (!alive) {
        if (it.bonusType === 'invincible') invincibleOnScreen = false;
        if (it.bonusType === 'magnet') magnetOnScreen = false;
      }
      return alive;
    }

    // ── 충돌 처리 ───────────────────────────────
    if (it.kind === 'obs') {
      if (P.invincibleTimer > 0) {
        // 무적 상태 — 장애물 파괴, 데미지 없음
        burst(it.x, it.y, '#ffffff', 10);
        burst(it.x, it.y, '#ffd700', 6);
        return false;
      }
      if (P.inv > 0) {
        // 데미지 무적(피격 후 80프레임) — 통과
        return it.y < H + 60;
      }
      // 데미지
      lives--;
      P.inv = 80; P.shake = 18; P.bump = 10;
      burst(it.x, it.y, COL.primary, 12);
      popup(P.x, P.y - 40, '💀 −1 LIFE', COL.primary);
      adaptHits.push(frame); // Adaptive: 피격 기록
      if (lives <= 0) { S = 'over'; if (score > hi) hi = score; }
      return false;
    } else if (it.kind === 'bonus') {
        if (it.bonusType === 'invincible') {
          P.invincibleTimer = 720; // 12초 무적
          invincibleOnScreen = false;
          burst(it.x, it.y, '#fff', 20);
          burst(it.x, it.y, '#ffd700', 16);
          urgentMsg = { text: '⚡ SUPER JORY! ×2 SPEED ⚡', col: '#ffd700', life: 120, maxLife: 120 };
          lastUrgentSec = -99;
          popup(P.x, P.y - 50, '⚡ SUPER JORY 12s!', '#ffd700');
        } else if (it.bonusType === 'golden_time') {
          timeLeft += 30 * 60; // +30초
          goldenSpawned = false;
          extraTimeAnim = 150;  // EXTRA TIME! 연출 시작
          burst(it.x, it.y, COL.gold, 20);
          burst(it.x, it.y, '#fff', 12);
        } else if (it.bonusType === 'magnet') {
          P.magnetTimer = 720; // 12초
          magnetOnScreen = false;
          burst(it.x, it.y, '#00aaff', 20);
          burst(it.x, it.y, '#fff', 10);
          urgentMsg = { text: '🧲 MAGNET! 음식이 달려온다!', col: '#00ccff', life: 120, maxLife: 120 };
          lastUrgentSec = -99;
          popup(P.x, P.y - 50, '🧲 MAGNET 12s!', '#00ccff');
        }
        return false;
      } else {
        const feverMult = P.feverTimer > 0 ? 2 : 1;
        const foodMult  = it.foodMult || 1;
        const prevCombo = combo;
        combo++; comboT = COMBO_TIMER;

        // 콤보 마일스톤 달성 여부 체크 (새 combo 값 기준)
        const milestone = COMBO_TIERS.find(t => t.at === combo);
        const comboMult = getComboMult(combo);
        // 마일스톤 도달 시 점수 추가 뻥튀기 (×2)
        const milestoneMult = milestone ? 2 : 1;
        const pts = Math.floor(10 * foodMult * feverMult * comboMult * milestoneMult);
        score += pts;
        timeLeft += 120; // 2초 추가, 상한 없음

        // 이펙트
        const burstCol = milestone ? milestone.col : (P.feverTimer > 0 ? COL.gold : '#fff');
        burst(it.x, it.y, burstCol, milestone ? 18 : 7);

        // 팝업 텍스트
        const multLabel = foodMult > 1 ? ` ×${foodMult}` : '';
        const comboLabel = combo >= 5 ? ` [×${comboMult}콤보]` : '';
        popup(it.x, it.y - 10, `+${pts}${multLabel}${comboLabel}`, milestone ? milestone.col : COL.gold);
        popup(it.x, it.y - 28, '+1s ⏰', COL.time);

        // 마일스톤 메시지
        if (milestone) {
          urgentMsg = { text: milestone.msg, col: milestone.col, life: 100, maxLife: 100 };
          lastUrgentSec = -99; // 다른 메시지와 충돌 방지
        }

        // 점수 파티클 — HUD 점수 위치로 날아감
        const pCol = milestone ? milestone.col : (foodMult >= 3 ? '#ff5500' : foodMult >= 2 ? COL.gold : '#ffffff');
        const pCount = (foodMult + 2) * (milestone ? 3 : 1) + (combo > 10 ? 2 : 0);
        for (let i = 0; i < pCount; i++) {
          scoreParticles.push({
            x: it.x + (Math.random()-0.5)*20,
            y: it.y + (Math.random()-0.5)*20,
            vx: (Math.random()-0.5)*4,
            vy: -2 - Math.random()*3,
            col: pCol, sz: 3 + Math.random()*3, life: 0,
          });
        }
        return false;
      }
    return false; // unreachable but safe fallback
  });

  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.alpha -= 0.025;
    return p.alpha > 0;
  });
  popups = popups.filter(p => {
    p.y += p.vy; p.alpha -= 0.022; return p.alpha > 0;
  });

  // 점수 HUD 파티클 — 왼쪽 상단 점수 위치(20,20)로 호밍
  if (scorePop > 0) scorePop--;
  scoreParticles = scoreParticles.filter(p => {
    const tx = 20, ty = 20;
    const dx = tx - p.x, dy = ty - p.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 22) { scorePop = 20; return false; }
    const spd = Math.min(6 + p.life * 0.3, 14);
    const norm = dist || 1;
    p.vx += (dx / norm) * 1.8;
    p.vy += (dy / norm) * 1.8;
    const curSpd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
    if (curSpd > spd) { p.vx = p.vx/curSpd*spd; p.vy = p.vy/curSpd*spd; }
    p.x += p.vx; p.y += p.vy;
    p.life++;
    return p.life < 80;
  });
}

// ── 드로우 헬퍼 ───────────────────────────────────
function em(e, x, y, sz) {
  cx.font = `${sz}px serif`; cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillText(e, x, y);
}
function txt(t, x, y, sz, col, align = 'center') {
  cx.font = `${sz}px Pretendard, -apple-system, sans-serif`;
  cx.fillStyle = col; cx.textAlign = align; cx.textBaseline = 'middle';
  cx.fillText(t, x, y);
}
function btxt(t, x, y, sz, col, align = 'center') {
  cx.font = `bold ${sz}px Pretendard, -apple-system, sans-serif`;
  cx.fillStyle = col; cx.textAlign = align; cx.textBaseline = 'middle';
  cx.fillText(t, x, y);
}
function rrect(x, y, w, h, r, fill, stroke, sw = 1) {
  cx.beginPath();
  cx.moveTo(x+r,y); cx.lineTo(x+w-r,y); cx.arcTo(x+w,y,x+w,y+r,r);
  cx.lineTo(x+w,y+h-r); cx.arcTo(x+w,y+h,x+w-r,y+h,r);
  cx.lineTo(x+r,y+h); cx.arcTo(x,y+h,x,y+h-r,r);
  cx.lineTo(x,y+r); cx.arcTo(x,y,x+r,y,r);
  cx.closePath();
  if (fill)  { cx.fillStyle = fill; cx.fill(); }
  if (stroke){ cx.strokeStyle = stroke; cx.lineWidth = sw; cx.stroke(); }
}

// ── 배경 ──────────────────────────────────────────
function drawBG() {
  cx.fillStyle = '#4a5e30';
  cx.fillRect(0, 0, W, H);
  if (bgReady) {
    const scale = W / bgImg.width;
    const bh = bgImg.height * scale;
    if (S === 'play') {
      let bgSpd = baseSpeed * 0.6 * (P.invincibleTimer > 0 ? 2 : 1);
      if (slowmoTimer > 0) bgSpd *= SLOWMO_FACTOR;
      bgY += bgSpd; if (bgY >= bh) bgY -= bh;
    }
    const startY = bgY - bh;
    for (let i = 0; i < 3; i++) cx.drawImage(bgImg, 0, startY + bh * i, W, bh);
  }
}

// ── HUD ───────────────────────────────────────────
function drawHUD() {
  const danger = timeLeft < 600;
  const warn   = timeLeft < 1200;
  const tCol   = danger ? '#ff3333' : warn ? '#ffaa00' : COL.time;
  const secs   = Math.ceil(timeLeft / 60);
  const tPct   = Math.min(1, Math.max(0, timeLeft / TIME_INIT)); // 60초 초과 시 바 꽉 참

  // 상단 그라데이션
  const g = cx.createLinearGradient(0, 0, 0, 84);
  g.addColorStop(0, 'rgba(10,14,26,0.95)'); g.addColorStop(1, 'rgba(10,14,26,0)');
  cx.fillStyle = g; cx.fillRect(0, 0, W, 84);

  // ── 타이머 (중앙, 크게) ──────────────────────────
  // 숫자
  btxt(`${secs}`, W/2, 22, 32, tCol);
  txt('TIME', W/2, 42, 9, `${tCol}99`);

  // 타이머 바 (상단 전체 폭)
  const bx = 16, by = 52, bw = W - 32, bh = 5;
  cx.fillStyle = 'rgba(255,255,255,0.08)';
  cx.beginPath(); cx.roundRect(bx, by, bw, bh, 3); cx.fill();
  if (tPct > 0) {
    const fg = cx.createLinearGradient(bx, 0, bx + bw, 0);
    fg.addColorStop(0, tCol);
    fg.addColorStop(1, danger ? '#ff8866' : warn ? '#ffdd44' : '#00f0ff');
    cx.fillStyle = fg;
    cx.beginPath(); cx.roundRect(bx, by, bw * tPct, bh, 3); cx.fill();
  }

  // ── 점수 (왼쪽) — 파티클 도착 시 띠용 bounce ─────
  if (scorePop > 0) {
    const s = 1 + Math.sin(scorePop / 20 * Math.PI) * 0.45;
    cx.save();
    cx.translate(20, 20); cx.scale(s, s); cx.translate(-20, -20);
    btxt(score.toLocaleString(), 20, 20, 18, COL.gold, 'left');
    cx.restore();
  } else {
    btxt(score.toLocaleString(), 20, 20, 18, COL.gold, 'left');
  }
  txt('SCORE', 20, 36, 8, 'rgba(255,255,255,0.3)', 'left');

  // ── 라이프 (오른쪽) ──────────────────────────────
  for (let i = 0; i < 3; i++) {
    cx.globalAlpha = i < lives ? 1 : 0.18;
    em('❤️', W - 18 - i * 26, 20, 14);
  }
  cx.globalAlpha = 1;

  // ── 콤보 HUD ─────────────────────────────────────
  if (combo > 0) {
    const tier = COMBO_TIERS.slice().reverse().find(t => combo >= t.at);
    const comboCol = tier ? tier.col : 'rgba(255,255,255,0.7)';
    const comboMult = getComboMult(combo);

    // 콤보 텍스트 (상단 중앙)
    cx.globalAlpha = 0.85 + Math.sin(frame * 0.25) * 0.15;
    btxt(combo >= 5 ? `🔥 ×${combo} COMBO  [×${comboMult}]` : `×${combo} COMBO`, W/2, 72, combo >= 5 ? 14 : 12, comboCol);
    cx.globalAlpha = 1;
  }

  // ── 왼쪽 세로 콤보 게이지 2개 ────────────────────
  if (combo > 0 || comboT > 0) {
    cx.save();
    const BOTTOM = H - 90;   // 하단 앵커
    const BW_STAGE = 11;     // 단계 바 폭
    const BH_STAGE = 170;    // 단계 바 높이
    const BW_TIMER = 7;      // 타이머 바 폭
    const BH_TIMER = 95;     // 타이머 바 높이
    const GAP = 5;
    const X = 10;            // 왼쪽 여백

    // ─ 단계 게이지 (왼쪽, 긴 것) ─
    // 현재 콤보가 전체 6구간(0→5→10→20→30→60) 중 어디에 해당하는지 0~1로 환산
    const BREAKS = [0, 5, 10, 20, 30, 60];
    let stagePct = 0;
    if (combo >= 60) {
      stagePct = 1;
    } else {
      for (let i = 0; i < BREAKS.length - 1; i++) {
        if (combo >= BREAKS[i] && combo < BREAKS[i + 1]) {
          const segPct = (combo - BREAKS[i]) / (BREAKS[i + 1] - BREAKS[i]);
          stagePct = (i + segPct) / (BREAKS.length - 1);
          break;
        }
      }
    }

    const sx = X, sy = BOTTOM - BH_STAGE;
    // 배경
    cx.globalAlpha = 0.25;
    cx.fillStyle = '#000';
    cx.beginPath(); cx.roundRect(sx, sy, BW_STAGE, BH_STAGE, 5); cx.fill();
    cx.globalAlpha = 1;

    if (stagePct > 0) {
      const fillH = BH_STAGE * stagePct;
      const fillY = BOTTOM - fillH;
      // 불꽃 그라디언트: 하→상 (금색→주황→빨강→진홍)
      const sg = cx.createLinearGradient(0, BOTTOM, 0, fillY);
      sg.addColorStop(0,   '#ffd700');
      sg.addColorStop(0.35,'#ff9900');
      sg.addColorStop(0.7, '#ff5500');
      sg.addColorStop(1,   '#ff0055');
      cx.fillStyle = sg;
      cx.beginPath(); cx.roundRect(sx, fillY, BW_STAGE, fillH, 5); cx.fill();

      // 꼭대기 불꽃 글로우 (단계 높을수록 강하게)
      if (stagePct > 0.15) {
        const flicker = Math.sin(frame * 0.35) * 0.4 + 0.6;
        cx.shadowColor = stagePct > 0.6 ? '#ff0055' : '#ff5500';
        cx.shadowBlur  = (8 + stagePct * 16) * flicker;
        cx.globalAlpha = 0.55 + stagePct * 0.35;
        cx.fillStyle   = '#fff';
        cx.beginPath(); cx.roundRect(sx, fillY, BW_STAGE, 3, 2); cx.fill();
        cx.shadowBlur  = 0;
        cx.globalAlpha = 1;
      }
    }

    // ─ 타이머 게이지 (오른쪽, 짧은 것) ─
    const timerPct = comboT / COMBO_TIMER;
    const tx = X + BW_STAGE + GAP, ty = BOTTOM - BH_TIMER;
    cx.globalAlpha = 0.25;
    cx.fillStyle = '#000';
    cx.beginPath(); cx.roundRect(tx, ty, BW_TIMER, BH_TIMER, 4); cx.fill();
    cx.globalAlpha = 1;

    if (timerPct > 0) {
      const fillH = BH_TIMER * timerPct;
      const fillY = BOTTOM - fillH;
      const tCol  = timerPct > 0.5 ? '#55ff88'
                  : timerPct > 0.25 ? '#ff9900' : '#ff2200';
      if (timerPct < 0.3) {
        cx.shadowColor = '#ff2200';
        cx.shadowBlur  = 6 + Math.sin(frame * 0.6) * 4;
      }
      cx.fillStyle = tCol;
      cx.beginPath(); cx.roundRect(tx, fillY, BW_TIMER, fillH, 4); cx.fill();
      cx.shadowBlur = 0;
    }

    cx.restore();
  }

  // ── Near Miss 카운터 (오른쪽 하단) ────────────────
  if (nearMissCount > 0) {
    cx.globalAlpha = 0.65;
    txt(`NEAR MISS ×${nearMissCount}`, W - 16, H - 96, 10, '#00ffaa', 'right');
    cx.globalAlpha = 1;
  }

  // ── 스피드바 (하단) ───────────────────────────────
  const pct = Math.min((baseSpeed - 4) / 6, 1);
  cx.fillStyle = 'rgba(255,255,255,0.05)'; cx.fillRect(0, H - 4, W, 4);
  if (pct > 0) {
    const sg = cx.createLinearGradient(0, 0, W * pct, 0);
    sg.addColorStop(0, COL.primary); sg.addColorStop(1, COL.gold);
    cx.fillStyle = sg; cx.fillRect(0, H - 4, W * pct, 4);
  }
}

// ── 조리 ─────────────────────────────────────────
function drawJori(x, y, size, alpha = 1, dir = 0) {
  cx.globalAlpha = alpha; cx.save(); cx.translate(x, y);
  let img, ready;
  if (dir < 0)      { img = imgs.left;  ready = imgReady.left; }
  else if (dir > 0) { img = imgs.right; ready = imgReady.right; }
  else {
    const useF1 = Math.floor(frame / 30) % 2 === 0;
    img = useF1 ? imgs.front1 : imgs.front2;
    ready = useF1 ? imgReady.front1 : imgReady.front2;
  }
  if (ready && img.naturalWidth > 0) {
    // contain fit — 모든 방향 스프라이트를 size×size 박스 기준으로 균일하게
    const scale = Math.min(size / img.naturalWidth, size / img.naturalHeight);
    const w = img.naturalWidth * scale, h = img.naturalHeight * scale;
    cx.drawImage(img, -w/2, -h/2, w, h);
  } else {
    cx.font = `${size*0.9}px serif`; cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillText('🐥', 0, 0);
  }
  cx.restore(); cx.globalAlpha = 1;
}

function drawPlayer() {
  const blink = P.inv > 0 && Math.floor(P.inv / 5) % 2 === 0;
  if (blink) return;
  const sx = P.shake > 0 ? (Math.random() - 0.5) * 5 : 0;
  const sy = P.bump  > 0 ? Math.sin(P.bump * 0.4) * -6 : 0;
  const px = P.x + sx, py = P.y + sy;

  cx.globalAlpha = 0.18; cx.fillStyle = '#000';
  cx.beginPath(); cx.ellipse(px, py + 44, 36, 12, 0, 0, Math.PI * 2); cx.fill();
  cx.globalAlpha = 1;

  // 이동 잔상 (vx 기반)
  const speed = Math.abs(P.vx);
  if (speed > 1) {
    drawJori(px - P.vx * 1.2, py + 5, 52, 0.15 + speed * 0.02, P.dir);
    drawJori(px - P.vx * 2.4, py + 8, 36, 0.06 + speed * 0.01, P.dir);
  }

  drawJori(px, py, 72, 1, P.dir);

  if (P.inv > 0) {
    cx.strokeStyle = `rgba(250,0,80,${P.inv / 80 * 0.8})`;
    cx.lineWidth = 2.5;
    cx.beginPath(); cx.arc(px, py, 50, 0, Math.PI * 2); cx.stroke();
  }

  // 무적 상태 — 금색 링 + glow
  if (P.invincibleTimer > 0) {
    const blink = Math.floor(P.invincibleTimer / 4) % 2 === 0;
    const auraA = 0.5 + Math.sin(frame * 0.3) * 0.2;
    cx.shadowColor = '#ffd700';
    cx.shadowBlur = 18 + Math.sin(frame * 0.3) * 6;
    cx.strokeStyle = `rgba(255,215,0,${auraA})`;
    cx.lineWidth = 3;
    cx.beginPath(); cx.arc(px, py, 62, 0, Math.PI * 2); cx.stroke();
    if (P.invincibleTimer > 60) {
      cx.strokeStyle = `rgba(255,255,180,${auraA * 0.4})`;
      cx.lineWidth = 1.5;
      cx.beginPath(); cx.arc(px, py, 78, 0, Math.PI * 2); cx.stroke();
    }
    cx.shadowBlur = 0;
    cx.globalAlpha = 1;
    if (P.invincibleTimer < 180 && blink) cx.globalAlpha = 0.4;
  }

  // 자석 오라 — 링 + glow
  if (P.magnetTimer > 0) {
    cx.shadowColor = '#00b4ff';
    cx.shadowBlur = 14 + Math.sin(frame * 0.25) * 4;
    cx.strokeStyle = `rgba(0,180,255,0.35)`;
    cx.lineWidth = 1.5;
    cx.beginPath(); cx.arc(px, py, 200, 0, Math.PI * 2); cx.stroke();
    cx.shadowBlur = 0;
    cx.globalAlpha = 1;
    if (P.magnetTimer < 180) cx.globalAlpha = 0.5 + Math.sin(frame * 0.4) * 0.5;
  }

}

// ── 아이템 드로우 ─────────────────────────────────
function drawItemImg(img, x, y, r) {
  if (img && img.complete && img.naturalWidth > 0) {
    const ratio = img.naturalHeight / img.naturalWidth, w = r*2, h = w*ratio;
    cx.drawImage(img, x - w/2, y - h/2, w, h);
  }
}

function drawItems() {
  items.forEach(it => {
    const r = 26;
    if (it.kind === 'obs') {
      if (it.obsType === 'damage') {
        if (coneReady) {
          const aspect = coneImg.naturalHeight / coneImg.naturalWidth;
          const w = r * 1.6, h = w * aspect;
          cx.drawImage(coneImg, it.x - w/2, it.y - h/2, w, h);
        } else {
          cx.font=`${r*1.4}px serif`; cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText('🔶',it.x,it.y);
        }
      }
    } else if (it.kind === 'bonus') {
      if (it.bonusType === 'invincible') {
        const fIdx = Math.floor((it.animFrame || 0) / 4) % 4;
        const img  = invincibleImgs[fIdx];
        if (img && img.complete && img.naturalWidth > 0) {
          const aspect = img.naturalHeight / img.naturalWidth;
          const w = r * 2.4, h = w * aspect;
          cx.drawImage(img, it.x - w/2, it.y - h/2, w, h);
        } else {
          cx.font = `${r*1.4}px serif`; cx.textAlign='center'; cx.textBaseline='middle';
          cx.fillText('🛡', it.x, it.y);
        }
        // "무적!" 배지
        cx.save();
        cx.fillStyle = 'rgba(255,215,0,0.95)';
        cx.beginPath(); cx.roundRect(it.x - 32, it.y - r - 2, 64, 16, 5); cx.fill();
        cx.font = 'bold 10px Pretendard, -apple-system, sans-serif';
        cx.fillStyle = '#000'; cx.textAlign='center'; cx.textBaseline='middle';
        cx.fillText('SUPER JORY', it.x, it.y - r + 6);
        cx.restore();
      } else if (it.bonusType === 'golden_time') {
        const img = bonusImgs.golden_time;
        if (img.complete && img.naturalWidth > 0) {
          const aspect = img.naturalHeight / img.naturalWidth;
          const w = r * 2, h = w * aspect;
          cx.drawImage(img, it.x - w/2, it.y - h/2, w, h);
        } else {
          cx.font=`${r}px serif`; cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText('✨',it.x,it.y);
        }
        // "시간 추가!" 텍스트 배지
        cx.save();
        cx.fillStyle = 'rgba(245,196,0,0.92)';
        cx.beginPath(); cx.roundRect(it.x - 28, it.y - r - 2, 56, 16, 5); cx.fill();
        cx.font = 'bold 10px Pretendard, -apple-system, sans-serif';
        cx.fillStyle = '#000'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillText('시간 추가!', it.x, it.y - r + 6);
        cx.restore();
      } else if (it.bonusType === 'magnet') {
        const fIdx = Math.floor((it.animFrame || 0) / 4) % 4;
        const mImg = magnetImgs[fIdx];
        if (mImg && mImg.complete && mImg.naturalWidth > 0) {
          const aspect = mImg.naturalHeight / mImg.naturalWidth;
          const w = r * 2.4, h = w * aspect;
          cx.drawImage(mImg, it.x - w/2, it.y - h/2, w, h);
        } else {
          cx.font=`${r*1.4}px serif`; cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText('🧲',it.x,it.y);
        }
        cx.save();
        cx.fillStyle = 'rgba(0,170,255,0.92)';
        cx.beginPath(); cx.roundRect(it.x - 28, it.y - r - 2, 56, 16, 5); cx.fill();
        cx.font = 'bold 10px Pretendard, -apple-system, sans-serif';
        cx.fillStyle = '#fff'; cx.textAlign='center'; cx.textBaseline='middle';
        cx.fillText('MAGNET', it.x, it.y - r + 6);
        cx.restore();
      }
    } else {
      drawItemImg(foodImgs[it.foodIdx], it.x, it.y, r);
      // ×2, ×3 배율 배지
      if (it.foodMult > 1) {
        const label = `×${it.foodMult}`;
        const col = it.foodMult >= 3 ? '#ff5500' : COL.gold;
        cx.save();
        cx.fillStyle = col;
        cx.beginPath(); cx.roundRect(it.x - 14, it.y - r + 1, 28, 16, 5); cx.fill();
        cx.font = 'bold 11px Pretendard, -apple-system, sans-serif';
        cx.fillStyle = '#000'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillText(label, it.x, it.y - r + 9);
        cx.restore();
      }
    }
  });
}

// ── 파티클 드로우 ─────────────────────────────────
function drawFX() {
  particles.forEach(p => {
    cx.globalAlpha = p.alpha; cx.fillStyle = p.col;
    cx.beginPath(); cx.arc(p.x, p.y, p.sz, 0, Math.PI*2); cx.fill();
  });
  // 점수 HUD 호밍 파티클
  scoreParticles.forEach(p => {
    cx.globalAlpha = Math.max(0, 1 - p.life / 80);
    cx.fillStyle = p.col;
    cx.beginPath(); cx.arc(p.x, p.y, p.sz, 0, Math.PI*2); cx.fill();
  });
  cx.globalAlpha = 1;
  popups.forEach(p => {
    cx.globalAlpha = p.alpha; btxt(p.txt, p.x, p.y, 13, p.col);
  });
  cx.globalAlpha = 1;
}

// ── 특수 이펙트 ───────────────────────────────────
function drawSpecialFX() {
  if (timeLeft < 600) {
    const a = 0.15 + Math.sin(frame * 0.35) * 0.15;
    cx.strokeStyle = `rgba(255,51,51,${a})`; cx.lineWidth = 6;
    cx.strokeRect(4, 4, W-8, H-8);
  }
  // Score Gate 슬로모션 — 시안 + 골드 테두리 펄스
  if (slowmoTimer > 0) {
    const fadeIn = Math.min(1, (SLOWMO_DURATION - slowmoTimer) / 30);
    const fadeOut = Math.min(1, slowmoTimer / 40);
    const alpha = Math.min(fadeIn, fadeOut);
    const pulse = 0.12 + Math.sin(frame * 0.15) * 0.06;
    // 화면 전체 시안 틴트
    cx.fillStyle = `rgba(0,255,170,${pulse * alpha})`;
    cx.fillRect(0, 0, W, H);
    // 골드 테두리
    cx.strokeStyle = `rgba(0,255,170,${(0.5 + Math.sin(frame * 0.2) * 0.3) * alpha})`;
    cx.lineWidth = 4;
    cx.strokeRect(3, 3, W-6, H-6);
    // SLOW MOTION 텍스트 (상단)
    if (slowmoTimer > 40) {
      cx.globalAlpha = alpha * 0.6;
      cx.font = 'bold 10px Pretendard, -apple-system, sans-serif';
      cx.fillStyle = '#00ffaa'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
      cx.fillText('⏳ SLOW MOTION', W/2, 64);
      cx.globalAlpha = 1;
    }
  }
}

// ── 긴박 메시지 (HURRY UP! 등) ───────────────────────
function drawUrgentMsg() {
  if (!urgentMsg || urgentMsg.life <= 0) return;
  const { text, col, life, maxLife } = urgentMsg;
  const t = life / maxLife; // 1→0
  // 등장: slam-in (scale 2.0→1.0), 퇴장: fade out
  const progress = 1 - t; // 0→1 경과
  const scaleIn  = progress < 0.2 ? 2.0 - (progress / 0.2) : 1.0;
  const alpha    = t < 0.25 ? t / 0.25 : 1.0;
  const y        = H * 0.38;

  cx.save();
  cx.globalAlpha = alpha;
  cx.translate(W/2, y);
  cx.scale(scaleIn, scaleIn);

  // 텍스트 쉐도우 glow
  cx.shadowColor = col;
  cx.shadowBlur  = 18 + Math.sin(frame * 0.4) * 6;
  cx.font = `900 22px Pretendard, -apple-system, sans-serif`;
  cx.fillStyle = col;
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(text, 0, 0);

  cx.restore();
  cx.globalAlpha = 1;
}

// ── 시작 화면 ─────────────────────────────────────
function drawStart() {
  // 타이틀 이미지 (둥실둥실)
  const floatY = Math.sin(frame * 0.04) * 8;
  if (titleImg.complete && titleImg.naturalWidth > 0) {
    const imgW = Math.min(380, W * 0.78);
    const imgH = imgW * (titleImg.naturalHeight / titleImg.naturalWidth);
    cx.drawImage(titleImg, W/2 - imgW/2, 80 + floatY, imgW, imgH);
  } else {
    cx.shadowColor = COL.primary; cx.shadowBlur = 24;
    btxt('Run Jory Run', W/2, 200, 38, COL.white);
    cx.shadowBlur = 0;
  }

  // 조리 — 하단, 달릴 준비 (좌우 발 번갈아 + 위아래 바운스)
  const bounce = Math.abs(Math.sin(frame * 0.12)) * 10;
  const runDir = Math.floor(frame / 18) % 2 === 0 ? -1 : 1; // 발 번갈아
  const joriY = H - 130 - bounce;
  cx.shadowColor = COL.primary; cx.shadowBlur = 28;
  drawJori(W/2, joriY, 80, 1, runDir);
  cx.shadowBlur = 0;

  // 그림자
  cx.globalAlpha = 0.22; cx.fillStyle = '#000';
  const shadowW = 40 + bounce * 1.5;
  cx.beginPath(); cx.ellipse(W/2, H - 80, shadowW, 10, 0, 0, Math.PI * 2); cx.fill();
  cx.globalAlpha = 1;

  // 시작 버튼
  const pulse = 1 + Math.sin(frame * 0.07) * 0.03;
  cx.save(); cx.translate(W/2, H - 200); cx.scale(pulse, pulse);
  rrect(-110, -24, 220, 48, 24, COL.primary);
  btxt('탭하여 시작', 0, 0, 17, '#fff');

  // 최고 기록
  if (hi > 0) {
    em('🏆', W/2 - 52, H - 148, 15);
    txt(`최고 기록  ${hi.toLocaleString()}`, W/2 + 12, H - 148, 13, COL.gold);
  }
}

// ── EXTRA TIME! 연출 ──────────────────────────────
// 총 150프레임 (2.5초)
// 150-110: 금빛 플래시 + 슬로우
// 110-40:  "EXTRA TIME!" 텍스트 슬램인
// 40-0:    페이드아웃
function drawExtraTime() {
  if (extraTimeAnim <= 0) return;
  const t = extraTimeAnim; // 150→0

  // ① 금빛 스크린 플래시 (150~100 구간)
  if (t > 100) {
    const flashA = (t - 100) / 50 * 0.55; // 0→0.55→0
    cx.fillStyle = `rgba(245,196,0,${flashA})`;
    cx.fillRect(0, 0, W, H);
  }

  // ② 테두리 금빛 펄스 (전 구간)
  const borderA = Math.min(t / 40, 1) * 0.8;
  cx.strokeStyle = `rgba(245,196,0,${borderA})`;
  cx.lineWidth = 12;
  cx.strokeRect(6, 6, W - 12, H - 12);

  // ③ "EXTRA TIME!" 텍스트 슬램인 (110~0 구간)
  if (t < 115) {
    const progress = Math.min((115 - t) / 30, 1); // 0→1 (슬램인)
    // ease-out: 처음엔 크게, 빠르게 안착
    const eased = 1 - Math.pow(1 - progress, 3);
    const scale = 2.8 - eased * 1.8; // 2.8→1.0

    // 페이드: t < 40부터 사라짐
    const fadeA = t < 40 ? t / 40 : 1;

    cx.save();
    cx.translate(W / 2, H / 2 - 20);
    cx.scale(scale, scale);
    cx.globalAlpha = fadeA;

    // 글로우
    cx.shadowColor = '#f5c400';
    cx.shadowBlur  = 30 + Math.sin(frame * 0.3) * 10;

    // 메인 텍스트
    cx.font = `bold 38px Pretendard, -apple-system, sans-serif`;
    cx.fillStyle = '#fff';
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    cx.fillText('EXTRA TIME!', 0, 0);

    // 금색 아웃라인
    cx.strokeStyle = '#f5c400';
    cx.lineWidth = 2 / scale;
    cx.strokeText('EXTRA TIME!', 0, 0);

    cx.shadowBlur = 0;
    cx.restore();
    cx.globalAlpha = 1;

    // 서브 텍스트 "TIME FULLY RESTORED"
    if (t < 80 && t > 20) {
      const subA = Math.min((80 - t) / 20, 1) * (t / 20);
      cx.globalAlpha = Math.min(subA, fadeA) * 0.85;
      cx.font = `bold 13px Pretendard, -apple-system, sans-serif`;
      cx.fillStyle = '#ffe066';
      cx.textAlign = 'center';
      cx.textBaseline = 'middle';
      cx.fillText('TIME FULLY RESTORED', W / 2, H / 2 + 28);
      cx.globalAlpha = 1;
    }
  }
}

}

// ── 메인 루프 (60fps 고정) ────────────────────────
const TARGET_MS = 1000 / 60; // 16.67ms
let lastTime = 0;

function loop(now) {
  requestAnimationFrame(loop);
  const dt = now - lastTime;
  if (dt < TARGET_MS - 1) return; // 60fps 초과 프레임 스킵
  lastTime = now - (dt % TARGET_MS); // drift 보정

  update();
  drawBG();
  drawItems();
  drawFX();
  if (S === 'play' || S === 'over' || S === 'dead') drawPlayer();
  if (S === 'play')  { drawSpecialFX(); drawHUD(); drawUrgentMsg(); drawExtraTime(); drawJoystick(); }
  if (S === 'start') drawStart();
  if (S === 'over')  { drawHUD(); drawOver(); }
}

function drawJoystick() {
  if (!joystick.active) return;
  const bx = joystick.startX, by = joystick.startY;
  cx.save();
  cx.globalAlpha = 0.25;
  cx.strokeStyle = '#fff';
  cx.lineWidth = 2;
  cx.beginPath(); cx.arc(bx, by, JOYSTICK_RADIUS, 0, Math.PI * 2); cx.stroke();
  const dist = Math.sqrt(joystick.dx ** 2 + joystick.dy ** 2);
  const clamp = Math.min(dist, JOYSTICK_RADIUS);
  const nx = dist > 0 ? joystick.dx / dist : 0;
  const ny = dist > 0 ? joystick.dy / dist : 0;
  const hx = bx + nx * clamp, hy = by + ny * clamp;
  cx.globalAlpha = 0.45;
  cx.fillStyle = '#fff';
  cx.beginPath(); cx.arc(hx, hy, 22, 0, Math.PI * 2); cx.fill();
  cx.restore();
}

requestAnimationFrame(loop);
</script>
